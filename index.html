<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyGlot Master: Elite Final</title>
    <style>
        :root { --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; --ios-bg: #F2F2F7; --master-green: #34C759; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; padding-bottom: 40px; }
        
        @keyframes boing { 0% { transform: scale(1); } 40% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .boing-active { animation: boing 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glow-active { box-shadow: 0 0 20px rgba(255, 149, 0, 0.7); background: #FF9500 !important; color: white !important; }
        
        /* 7단계 블랙 아우터 글로우 */
        @keyframes blackPulse { 0% { box-shadow: 0 0 10px rgba(0,0,0,0.4); } 100% { box-shadow: 0 0 30px rgba(0,0,0,0.9); } }
        .black-glow { animation: blackPulse 1.5s infinite alternate !important; border: 2.5px solid #000 !important; background: #1C1C1E !important; color: white !important; }
        .black-glow .en-text-container { color: #fff !important; }

        .nav-bar { display: flex; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 0.5px solid #D1D1D6; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 14px; font-weight: 800; color: #8E8E93; cursor: pointer; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .speech-bubble { background: #fff; border-radius: 20px; padding: 22px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; border: 2px solid transparent; transition: 0.3s; }
        .audio-bubble { background: #fff; border-radius: 16px; padding: 12px; display: flex; justify-content: center; gap: 8px; border: 1px solid #EAEAEA; margin: 12px 0; }
        
        .en-text-container { font-size: 28px; font-weight: 900; line-height: 1.35; color: var(--apple-navy); }
        .en-word.active-blue { color: var(--ios-blue) !important; }
        .en-word.blurred { background: #E5E5EA; color: transparent !important; border-radius: 6px; padding: 0 4px; }

        /* Writing Input */
        .writing-container { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .writing-input { width: 100%; height: 55px; border-radius: 14px; border: 2px solid #D1D1D6; padding: 0 15px; font-size: 18px; font-weight: 700; text-align: center; outline: none; transition: 0.2s; }
        .writing-input:focus { border-color: var(--ios-blue); }

        .lesson-card { background: #fff; border: 2px solid #EAEAEA; border-radius: 16px; padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .lesson-card.mastered { border-color: var(--master-green); background: #F2FCF4; }

        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; transition: 0.2s; }
        .btn-red { background: var(--ios-red); color: white; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-gray { background: #E5E5EA; color: var(--apple-navy); }
        
        #recordingPanel { display: none; background: #fff; border-radius: 20px; padding: 15px; align-items: center; justify-content: space-between; border: 1.5px solid var(--ios-red); margin-bottom: 15px; }
        .wave-bar { width: 3.5px; background: var(--ios-red); border-radius: 2px; height: 4px; transition: height 0.05s; }

        #mcqArea { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .mcq-btn { background: #F2F2F7; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="countdownOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.9); z-index:9999; justify-content:center; align-items:center; flex-direction:column;">
    <div style="font-size:120px; font-weight:900; color:var(--ios-blue);" id="countdownNumber">3</div>
</div>

<div class="container">
    <nav class="nav-bar">
        <button class="tab active" id="tab-game" onclick="switchTab('game')">GAME START</button>
        <button class="tab" id="tab-archive" onclick="switchTab('archive')">STORAGE</button>
    </nav>

    <div id="sec-game" class="section active">
        <div id="recordingPanel">
            <div style="display:flex; gap:3px; height:40px; align-items:center;" id="waveform"></div>
            <div style="font-weight:900; font-size:22px;" id="recTimer">00:00</div>
            <button onclick="stopAnyRecording(this)" style="background:var(--ios-red); color:white; border:none; padding:10px; border-radius:10px; font-weight:800;">완료</button>
        </div>

        <div id="loadingUI" style="display:none; text-align:center; padding:30px;">
            <div style="font-weight:800; color:var(--ios-blue); margin-bottom:10px;">AI 분석 중...</div>
            <div style="width:100%; height:10px; background:#E5E5EA; border-radius:5px;"><div id="progressBar" style="width:0; height:100%; background:var(--ios-blue); border-radius:5px; transition:0.2s;"></div></div>
        </div>

        <div id="introView">
            <div class="speech-bubble" style="text-align:center; margin-bottom:20px;">
                <div style="font-size:40px; margin-bottom:10px;">🎙️</div>
                <div style="font-size:20px; font-weight:900;">오늘 어떤 일이 있었나요?<br>편하게 말해보세요!</div>
                <div style="display:flex; gap:5px; margin-top:20px; background:#E5E5EA; padding:4px; border-radius:12px;">
                    <div class="diff-opt active" style="flex:1; padding:10px; border-radius:10px; cursor:pointer;" onclick="setDifficulty('beginner', this)">🌱 초급</div>
                    <div class="diff-opt" style="flex:1; padding:10px; border-radius:10px; cursor:pointer;" onclick="setDifficulty('intermediate', this)">🌿 중급</div>
                    <div class="diff-opt" style="flex:1; padding:10px; border-radius:10px; cursor:pointer;" onclick="setDifficulty('advanced', this)">🌳 상급</div>
                </div>
            </div>
            <button class="btn-apple btn-red" onclick="handleMainRecord(this)">녹음 시작하기</button>
        </div>

        <div id="dashboardView" style="display:none;">
            <div class="speech-bubble" id="dashMainBubble">
                <div id="dashLabel" style="font-size:12px; font-weight:800; color:#888; margin-bottom:5px;">AI 교정 리포트</div>
                <div class="en-text-container" id="dashEnText" style="font-size:22px;"></div>
                <div id="dashKoText" style="margin-top:10px; font-weight:700; color:#666;"></div>
            </div>
            <div style="margin-top:20px; font-weight:900; color:#888;">1단계: 덩어리 표현 (3개) <span id="keyProgText" style="color:var(--ios-blue);">0/3</span></div>
            <div id="keyList"></div>
            <div style="margin-top:20px; font-weight:900; color:#888;">2단계: 핵심 단어 7단계 (3개) <span id="vocabProgText" style="color:var(--ios-blue);">0/3</span></div>
            <div id="vocabList"></div>
            <div style="margin-top:20px; font-weight:900; color:#888;">3단계: 전체 드릴 마스터 <span id="fullProgText" style="color:var(--ios-blue);">0/1</span></div>
            <div id="fullDrillCard"></div>
            <button class="btn-apple btn-gray" style="margin-top:20px;" onclick="location.reload()">새로운 이야기 하기</button>
        </div>

        <div id="practiceView" style="display:none;">
            <div class="step-badge-container"><div class="step-badge" id="stepBadge">STEP 1</div></div>
            <div class="speech-bubble" style="text-align:center;"><div id="pracKoText" style="font-size:20px; font-weight:900;"></div></div>
            <div class="audio-bubble">
                <button onclick="playTTS()" class="btn-audio-main">🔊 영어 듣기</button>
                <button onclick="synth.cancel()" class="btn-audio-sub">⏸ 멈춤</button>
            </div>
            <div class="speech-bubble"><div class="en-text-container" id="pracEnText"></div></div>
            
            <div id="writingArea" class="writing-container" style="display:none;">
                <input type="text" id="writingInput" class="writing-input" placeholder="여기에 영어를 적어주세요">
                <button onclick="checkWriting()" class="btn-apple btn-blue">정답 확인</button>
            </div>
            <div id="mcqArea" style="display:none;"></div>

            <div id="pracResultArea" style="display:none; margin-top:15px;">
                <div class="score-bubble" style="display:flex; align-items:center; gap:15px; background:#fff; padding:15px; border-radius:15px;">
                    <div id="scoreText" style="font-size:35px; font-weight:900; color:var(--ios-blue);">85</div>
                    <div id="scoreMsg" style="font-weight:700;">좋아요!</div>
                </div>
            </div>

            <button id="pracRecordBtn" class="btn-apple btn-red" onclick="handleQuickRecord(this)" style="margin-top:15px;">발음 녹음하기</button>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                <button class="btn-apple btn-gray" onclick="goDashboard()">⬅️ 목록</button>
                <button id="pracNextBtn" class="btn-apple btn-blue" onclick="nextDrillStage()">다음 단계 ➡️</button>
            </div>
        </div>
    </div>

    <div id="sec-archive" class="section">
        <h2 style="font-weight:900;">학습 기록</h2>
        <div id="archiveList"></div>
    </div>
</div>

<script>
    let lessonData = null, currentPracticeMode = null;
    let selectedDifficulty = 'intermediate';
    let mediaRecorder, chunks = [], audioCtx, analyser, dataArray, animationId;
    let synth = window.speechSynthesis, recSeconds = 0, timerInt;

    function switchTab(tab) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`sec-${tab}`).classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
        if(tab === 'archive') renderArchive();
    }

    function setDifficulty(lvl, el) {
        selectedDifficulty = lvl;
        document.querySelectorAll('.diff-opt').forEach(o => o.classList.remove('active'));
        el.classList.add('active');
    }

    async function handleMainRecord(btn) {
        applyBoing(btn); btn.classList.add('glow-active');
        setTimeout(async () => {
            btn.classList.remove('glow-active');
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('countdownOverlay').style.display = 'flex';
            let c = 3; 
            const ci = setInterval(() => {
                c--; document.getElementById('countdownNumber').innerText = c;
                if(c === 0) { clearInterval(ci); document.getElementById('countdownOverlay').style.display = 'none'; startRecording(stream, processKoreanAI); }
            }, 1000);
        }, 400);
    }

    function startRecording(stream, cb) {
        document.getElementById('recordingPanel').style.display = 'flex';
        document.getElementById('introView').style.display = 'none';
        recSeconds = 0; timerInt = setInterval(() => { recSeconds++; document.getElementById('recTimer').innerText = `${Math.floor(recSeconds/60).toString().padStart(2,'0')}:${(recSeconds%60).toString().padStart(2,'0')}`; }, 1000);
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser(); audioCtx.createMediaStreamSource(stream).connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        mediaRecorder = new MediaRecorder(stream); chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = cb; mediaRecorder.start(); drawWave();
    }

    function drawWave() {
        animationId = requestAnimationFrame(drawWave); analyser.getByteFrequencyData(dataArray);
        const wf = document.getElementById('waveform'); wf.innerHTML = '';
        for(let i=0; i<20; i++) {
            const b = document.createElement('div'); b.className = 'wave-bar';
            b.style.height = Math.max(4, (dataArray[i*2]/128)*35) + 'px'; wf.appendChild(b);
        }
    }

    async function processKoreanAI() {
        document.getElementById('recordingPanel').style.display = 'none';
        document.getElementById('loadingUI').style.display = 'block';
        let w = 0; const pi = setInterval(() => { w += 5; if(w>95) w=95; document.getElementById('progressBar').style.width = w+'%'; }, 200);
        const b64 = await getBase64Audio();
        const res = await fetch("/api/openai-proxy", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({audio: b64, action: 'korean', difficulty: selectedDifficulty}) });
        lessonData = await res.json();
        lessonData.id = Date.now();
        lessonData.completed = { keys: [false, false, false], vocab: [false, false, false], full: false };
        clearInterval(pi); document.getElementById('loadingUI').style.display = 'none';
        saveToArchive(); showDashboard();
    }

    function showDashboard() {
        document.getElementById('dashboardView').style.display = 'block';
        document.getElementById('practiceView').style.display = 'none';
        document.getElementById('dashEnText').innerText = lessonData.english;
        document.getElementById('dashKoText').innerText = lessonData.korean;
        
        const totalC = lessonData.completed.keys.filter(Boolean).length + lessonData.completed.vocab.filter(Boolean).length + (lessonData.completed.full?1:0);
        const mb = document.getElementById('dashMainBubble'); mb.className = 'speech-bubble';
        const colors = ['#fff', '#F2F2F7', '#FFFBE6', '#E8F5E9', '#E6F2FF', '#D2DAE2', '#F3E5F5'];
        if(totalC < 7) mb.style.background = colors[totalC]; else mb.classList.add('black-glow');

        document.getElementById('keyProgText').innerText = `${lessonData.completed.keys.filter(Boolean).length}/3`;
        document.getElementById('vocabProgText').innerText = `${lessonData.completed.vocab.filter(Boolean).length}/3`;
        document.getElementById('fullProgText').innerText = `${lessonData.completed.full?1:0}/1`;

        document.getElementById('keyList').innerHTML = lessonData.keys.map((k, i) => `<div class="lesson-card ${lessonData.completed.keys[i]?'mastered':''}" onclick="startPractice('key_${i}_1')"><div><div style="font-size:13px; color:#888;">${k.ko_org}</div><div style="font-weight:900;">${k.phrase}</div></div><div>${lessonData.completed.keys[i]?'✅':'▶'}</div></div>`).join('');
        document.getElementById('vocabList').innerHTML = lessonData.vocab.map((v, i) => `<div class="lesson-card ${lessonData.completed.vocab[i]?'mastered':''}" onclick="startPractice('vocab_${i}_1')"><div><div style="font-size:13px; color:#888;">${v.pos} | ${v.phonetics}</div><div style="font-weight:900;">${v.word}</div><div style="font-weight:800; color:#666;">${v.meaning}</div></div><div>${lessonData.completed.vocab[i]?'✅':'📝'}</div></div>`).join('');
        document.getElementById('fullDrillCard').innerHTML = `<div class="lesson-card ${lessonData.completed.full?'mastered':''}" onclick="startPractice('full_1')"><div><div style="font-size:13px; color:#888;">전체 문장 마스터</div><div style="font-weight:900;">Master the Sentence</div></div><div>${lessonData.completed.full?'✅':'➡️'}</div></div>`;
    }

    function startPractice(mode) {
        currentPracticeMode = mode; document.getElementById('dashboardView').style.display = 'none';
        document.getElementById('practiceView').style.display = 'block'; setupPracticeUI();
    }

    function setupPracticeUI() {
        let ko = "", en = "", blur = "none", step = 1, type = "";
        const p = currentPracticeMode.split('_'); step = parseInt(p[p.length-1]);
        
        document.getElementById('writingArea').style.display = 'none';
        document.getElementById('mcqArea').style.display = 'none';
        document.getElementById('pracRecordBtn').style.display = 'block';
        document.getElementById('pracResultArea').style.display = 'none';

        if(p[0] === 'key') {
            const k = lessonData.keys[p[1]]; ko = k.ko_org; en = k.en_org;
            if(step === 2 || step === 4) blur = k.phrase; if(step >= 3) { ko = k.ko_var; en = k.en_var; } if(step === 5) blur = "all";
            document.getElementById('stepBadge').innerText = `PHRASE STEP ${step}/5`;
        } else if(p[0] === 'vocab') {
            const v = lessonData.vocab[p[1]];
            document.getElementById('stepBadge').innerText = `VOCAB STEP ${step}/7`;
            if(step === 1) { ko = v.meaning; en = v.word; }
            else if(step === 2) { ko = v.meaning; en = v.word; blur = "all"; }
            else if(step === 3) { ko = v.meaning; en = "???"; }
            else if(step === 4) { ko = "음성을 듣고 뜻을 고르세요"; en = "???"; renderMCQ(v); document.getElementById('pracRecordBtn').style.display = 'none'; }
            else if(step === 5) { ko = `${v.meaning} (쓰기)`; en = "???"; type = "write"; }
            else if(step === 6) { ko = "듣고 받아쓰기"; en = "???"; type = "dictate"; }
            else { ko = v.example_ko; en = v.example_en; }
        } else {
            const d = lessonData.drills[step-1]; ko = d.ko; en = d.en_full; blur = d.blur_part;
            document.getElementById('stepBadge').innerText = `SENTENCE STEP ${step}/5`;
        }

        document.getElementById('pracKoText').innerText = ko;
        renderWords(en, blur);
        if(type) { document.getElementById('writingArea').style.display = 'flex'; document.getElementById('pracRecordBtn').style.display = 'none'; document.getElementById('writingInput').value = ''; }
    }

    function renderWords(txt, blur) {
        const c = document.getElementById('pracEnText'); c.innerHTML = '';
        txt.split(' ').forEach(w => {
            const s = document.createElement('span'); s.className = 'en-word'; s.innerText = w + ' ';
            if(blur === "all" || (blur !== "none" && w.toLowerCase().includes(blur.toLowerCase()))) s.classList.add('blurred');
            c.appendChild(s);
        });
    }

    function renderMCQ(v) {
        const a = document.getElementById('mcqArea'); a.style.display = 'flex'; a.innerHTML = '';
        [v.meaning, ...v.wrong_options].sort(() => Math.random()-0.5).forEach(o => {
            const b = document.createElement('button'); b.className = 'mcq-btn'; b.innerText = o;
            b.onclick = () => { if(o === v.meaning) { b.style.background = 'var(--master-green)'; b.style.color = '#fff'; showScore(100, "정답!"); } else b.style.background = 'var(--ios-red)'; };
            a.appendChild(b);
        });
    }

    function checkWriting() {
        const input = document.getElementById('writingInput').value.trim().toLowerCase();
        const p = currentPracticeMode.split('_'); const v = lessonData.vocab[p[1]];
        if(input === v.word.toLowerCase()) { showScore(100, "완벽한 스펠링입니다!"); } else alert("다시 확인해보세요!");
    }

    function showScore(s, m) {
        document.getElementById('pracResultArea').style.display = 'block';
        document.getElementById('scoreText').innerText = s; document.getElementById('scoreMsg').innerText = m;
        if(s >= 70) document.getElementById('pracNextBtn').classList.add('btn-glow');
    }

    async function handleQuickRecord(btn) {
        applyBoing(btn); const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        startRecording(stream, async () => {
            document.getElementById('recordingPanel').style.display = 'none';
            const b64 = await getBase64Audio();
            let target = document.getElementById('pracEnText').innerText;
            if(currentPracticeMode.includes('vocab') && target.includes('?')) { target = lessonData.vocab[currentPracticeMode.split('_')[1]].word; }
            const res = await fetch("/api/openai-proxy", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({audio:b64, action:'evaluate', target_english: target}) });
            const d = await res.json(); showScore(d.score, d.feedback);
        });
    }

    function nextDrillStage() {
        const p = currentPracticeMode.split('_'); let s = parseInt(p[p.length-1]);
        const max = p[0] === 'vocab' ? 7 : 5;
        if(s < max) { currentPracticeMode = p.slice(0,-1).join('_') + '_' + (s+1); setupPracticeUI(); }
        else {
            if(p[0] === 'key') lessonData.completed.keys[p[1]] = true;
            else if(p[0] === 'vocab') lessonData.completed.vocab[p[1]] = true;
            else lessonData.completed.full = true;
            goDashboard();
        }
    }

    function goDashboard() { saveToArchive(); document.getElementById('practiceView').style.display = 'none'; showDashboard(); }
    function stopAnyRecording() { clearInterval(timerInt); mediaRecorder.stop(); audioCtx.close(); }
    function saveToArchive() { 
        let arc = JSON.parse(localStorage.getItem('archive_poly_v11')) || [];
        const idx = arc.findIndex(a => a.id === lessonData.id);
        if(idx !== -1) arc[idx].data = lessonData; else arc.unshift({ id: lessonData.id, date: new Date().toLocaleString(), title: lessonData.title, data: lessonData });
        localStorage.setItem('archive_poly_v11', JSON.stringify(arc));
    }
    function renderArchive() {
        const arc = JSON.parse(localStorage.getItem('archive_poly_v11')) || [];
        document.getElementById('archiveList').innerHTML = arc.map(a => `<div class="archive-bubble" onclick="loadArchive(${a.id})"><div class="archive-header">${a.date}</div><div class="archive-title">${a.title}</div></div>`).join('');
    }
    function loadArchive(id) { lessonData = (JSON.parse(localStorage.getItem('archive_poly_v11'))).find(a => a.id === id).data; switchTab('game'); showDashboard(); }
    function playTTS() { synth.cancel(); const ut = new SpeechSynthesisUtterance(document.getElementById('pracEnText').innerText); ut.lang = 'en-US'; synth.speak(ut); }
    function applyBoing(el) { el.classList.remove('boing-active'); void el.offsetWidth; el.classList.add('boing-active'); }
    async function getBase64Audio() { const b = new Blob(chunks, { type: 'audio/m4a' }); return new Promise(r => { const reader = new FileReader(); reader.onloadend = () => r(reader.result.split(',')[1]); reader.readAsDataURL(b); }); }
</script>
</body>
</html>
