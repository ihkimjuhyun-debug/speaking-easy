<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyGlot Master: Elite Edition</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --master-green: #34C759;
            --skip-blue: #B3D4FF; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; padding-bottom: 40px; }
        
        /* ✨ 1. 바운스 증폭 애니메이션 (scale 1.15로 훨씬 역동적) */
        @keyframes boing { 0% { transform: scale(1); } 40% { transform: scale(1.15); } 70% { transform: scale(0.95); } 100% { transform: scale(1); } }
        .boing-active { animation: boing 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* ✨ 2. 녹음 시 빛나는 테두리 (Glowing Border) */
        .glow-active { box-shadow: 0 0 25px rgba(255, 149, 0, 0.8) !important; border: 2px solid #FF9500 !important; background: #FF9500 !important; transform: scale(1.05); transition: 0.2s all; }

        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 0.5px solid #D1D1D6; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 14px; font-weight: 800; color: #8E8E93; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ✨ 3. 말풍선 디자인 (분리형 & 진척도 색상 적용 가능) */
        .bubble-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .speech-bubble { background: #fff; border-radius: 20px 20px 20px 4px; padding: 22px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); position: relative; text-align: left; transition: background 0.3s; }
        .bubble-ko { font-size: 15px; font-weight: 700; color: #666; margin-top: 8px; line-height: 1.4; border-top: 1px solid #EAEAEA; padding-top: 12px; }
        
        .step-badge-container { display: flex; justify-content: center; margin-bottom: 12px; }
        .step-badge { background: var(--ios-blue); color: white; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: 900; }
        
        /* 노래방 자막 및 평가 텍스트 */
        .en-text-container { font-size: 28px; font-weight: 900; line-height: 1.35; color: var(--apple-navy); }
        .en-word { display: inline-block; margin-right: 6px; margin-bottom: 6px; transition: color 0.2s; }
        .en-word.active-blue { color: var(--ios-blue) !important; }
        /* ✨ 4. 틀린 발음은 회색으로 딤처리 */
        .en-word.dimmed { color: #D1D1D6 !important; }
        .en-word.blurred { background: #E5E5EA; color: transparent !important; border-radius: 6px; padding: 0 5px; pointer-events: none; }

        .audio-wrapper { display: flex; justify-content: center; margin-bottom: 25px; height: 38px; gap: 8px; }
        .btn-audio-main { background: #E8F5E9; color: var(--master-green); border: none; border-radius: 12px; font-size: 13px; font-weight: 900; cursor: pointer; padding: 0 20px; display: flex; align-items: center; gap: 6px; }
        .btn-audio-sub { background: #F2F2F7; color: #555; border: none; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 0 16px; }
        
        .diff-control { display: flex; background: #E5E5EA; border-radius: 14px; padding: 4px; margin-bottom: 20px; gap: 4px; }
        .diff-opt { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 800; color: #8E8E93; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .diff-opt.active { background: #fff; color: var(--apple-navy); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .lang-opt.active { background: #E8F5E9; color: var(--master-green); }

        .dashboard-title { font-size: 16px; font-weight: 900; margin-bottom: 15px; color: #888; display: flex; justify-content: space-between; align-items: flex-end; }
        .progress-count { font-size: 14px; font-weight: 800; color: var(--ios-blue); }
        
        .lesson-card { background: #fff; border: 2px solid #EAEAEA; border-radius: 16px; padding: 18px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: transform 0.1s; -webkit-tap-highlight-color: transparent;}
        .lesson-card.mastered { border-color: var(--master-green); background: #F2FCF4; }

        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
        .btn-red { background: var(--ios-red); color: white; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-gray { background: #E5E5EA; color: var(--apple-navy); }
        .btn-skip-pale { background: var(--skip-blue); color: #0056B3; font-weight: 900; }

        #recordingPanel { display: none; background: #fff; border-radius: 20px; padding: 15px 20px; align-items: center; justify-content: space-between; border: 1.5px solid var(--ios-red); margin-bottom: 15px; }
        .waveform-container { display: flex; align-items: center; gap: 3.5px; height: 40px; flex: 2; overflow: hidden; }
        .wave-bar { width: 3.5px; background: var(--ios-red); border-radius: 2px; height: 4px; transition: height 0.05s ease; }
        .stopwatch { font-family: "Malgun Gothic", sans-serif; font-weight: 900; font-size: 22px; flex: 1; text-align: center; }
        
        #loadingUI { display: none; text-align: center; padding: 30px 0; }
        .progress-bg { width: 100%; height: 12px; background: #E5E5EA; border-radius: 10px; overflow: hidden; margin: 0 auto; max-width: 80%; }
        .progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 0.2s; }

        #countdownOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .countdown-num { font-size: 120px; font-weight: 900; color: var(--ios-blue); animation: popIn 1s infinite; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 30% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

        .result-bubble-container { text-align: left; margin-top: 25px; }
        .score-bubble { background: #F8F8FA; border-radius: 14px; padding: 15px 20px; border: 1px solid #EAEAEA; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .score-num {
