<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speaking Master: Elite Edition</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --master-green: #34C759;
            --skip-blue: #B3D4FF; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; padding-bottom: 40px; }
        
        /* ✨ 또잉(Boing) 애니메이션 정의 */
        @keyframes boing {
            0% { transform: scale(1); }
            40% { transform: scale(1.15); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .boing { animation: boing 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .btn-apple { 
            width: 100%; height: 60px; border-radius: 18px; border: none; 
            font-size: 17px; font-weight: 800; cursor: pointer; 
            transition: transform 0.1s, background 0.2s; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 10px; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn-apple:active { transform: scale(0.92); }

        /* 네비게이션 & 탭 */
        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 0.5px solid #D1D1D6; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 14px; font-weight: 800; color: #8E8E93; cursor: pointer; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 카드 & 텍스트 */
        .chat-box { background: #fff; border-radius: 24px; padding: 25px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px; text-align: center; }
        .ko-text { font-size: 22px; font-weight: 900; color: #111; margin-bottom: 25px; line-height: 1.4; }
        .en-text-container { font-size: 28px; font-weight: 900; line-height: 1.35; margin-bottom: 25px; text-align: left; }
        .en-word { color: #D1D1D6; cursor: pointer; display: inline-block; margin-right: 6px; }
        .en-word.active-blue { color: var(--ios-blue); transition: color 0.1s; }
        .en-word.blurred { background: #E5E5EA; color: transparent; border-radius: 6px; padding: 0 5px; }

        /* 버튼 컬러 */
        .btn-red { background: var(--ios-red); color: white; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-gray { background: #E5E5EA; color: var(--apple-navy); }
        .btn-skip-pale { background: var(--skip-blue); color: #0056B3; font-weight: 900; }
        .btn-glow { animation: glowPulse 1.5s infinite alternate; border: 2px solid white; }
        @keyframes glowPulse { 0% { box-shadow: 0 0 5px rgba(0, 122, 255, 0.5); } 100% { box-shadow: 0 0 20px rgba(0, 122, 255, 0.8); } }

        /* 대시보드 진행도 */
        .dashboard-title { font-size: 18px; font-weight: 900; margin-bottom: 15px; color: var(--dial-navy); display: flex; justify-content: space-between; align-items: flex-end; }
        .progress-count { font-size: 14px; font-weight: 800; color: var(--ios-blue); }
        .lesson-card { background: #fff; border: 2px solid #EAEAEA; border-radius: 16px; padding: 18px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .lesson-card.mastered { border-color: var(--master-green); background: #F2FCF4; }

        /* 녹음 패널 */
        #recordingPanel { display: none; background: #fff; border-radius: 20px; padding: 15px 20px; align-items: center; justify-content: space-between; border: 1.5px solid var(--ios-red); margin-bottom: 15px; }
        .waveform-container { display: flex; align-items: center; gap: 3.5px; height: 40px; flex: 2; overflow: hidden; }
        .wave-bar { width: 3.5px; background: var(--ios-red); border-radius: 2px; height: 4px; transition: height 0.05s ease; }
        .stopwatch { font-weight: 900; font-size: 22px; flex: 1; text-align: center; }

        /* 카운트다운 오버레이 */
        #countdownOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .countdown-num { font-size: 120px; font-weight: 900; color: var(--ios-blue); animation: popIn 1s infinite; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 30% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

        /* 아카이브 말풍선 */
        .archive-bubble { background: #fff; border-radius: 24px 24px 24px 6px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); cursor: pointer; border: 1px solid #EAEAEA; }
        .archive-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: 800; margin-bottom: 8px; }
        .archive-title { font-size: 18px; font-weight: 900; color: var(--dial-navy); }

        .diff-control { display: flex; background: #E5E5EA; border-radius: 14px; padding: 4px; margin-bottom: 20px; gap: 4px; }
        .diff-opt { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 800; color: #8E8E93; border-radius: 10px; cursor: pointer; }
        .diff-opt.active { background: #fff; color: var(--apple-navy); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .lang-opt.active { background: #E8F5E9; color: var(--master-green); }
        
        #loadingUI { display: none; text-align: center; padding: 30px 0; }
        .progress-bg { width: 100%; height: 12px; background: #E5E5EA; border-radius: 10px; overflow: hidden; margin: 0 auto; max-width: 80%; }
        .progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 0.2s; }
    </style>
</head>
<body>

<div id="countdownOverlay">
    <div style="font-size: 20px; font-weight: 800; color: #888; margin-bottom: 20px;">준비하세요!</div>
    <div class="countdown-num" id="countdownNumber">3</div>
</div>

<div class="container">
    <nav class="nav-bar">
        <button class="tab active" onclick="switchTab('game')">GAME START</button>
        <button class="tab" onclick="switchTab('archive')">STORAGE</button>
    </nav>

    <div id="sec-game" class="section active">
        <div id="recordingPanel">
            <div class="waveform-container" id="waveform"><script>for(let i=0; i<25; i++) document.write('<div class="wave-bar"></div>');</script></div>
            <div class="stopwatch" id="recTimer">00:00</div>
            <button class="btn-stop" style="background:var(--ios-red); color:white; border:none; padding:10px 15px; border-radius:12px; font-weight:800;" onclick="stopAnyRecording()">완료</button>
        </div>
        
        <div id="loadingUI">
            <div style="font-size: 15px; font-weight: 800; color: var(--ios-blue); margin-bottom: 10px;" id="loadingMsg">AI가 분석 중입니다...</div>
            <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div id="introView">
            <div class="chat-box">
                <div style="font-size: 40px; margin-bottom: 10px;">🎙️</div>
                <div class="ko-text">"오늘 하루 어땠는지<br>편하게 말해보세요!"</div>
                <div class="diff-control">
                    <div class="diff-opt" onclick="setDifficulty('beginner')" id="diff-beginner">🌱 초급</div>
                    <div class="diff-opt active" onclick="setDifficulty('intermediate')" id="diff-intermediate">🌿 중급</div>
                    <div class="diff-opt" onclick="setDifficulty('advanced')" id="diff-advanced">🌳 상급</div>
                </div>
                <div class="diff-control" style="background: #F2F2F7;">
                    <div class="diff-opt lang-opt active" onclick="setLangMode('ko')" id="lang-ko">🇰🇷 한국어 전용</div>
                    <div class="diff-opt lang-opt" onclick="setLangMode('mixed')" id="lang-mixed">🇺🇸 한/영 혼용</div>
                </div>
            </div>
            <button class="btn-apple btn-red" id="mainRecordBtn" onclick="handleMainRecord(this)">녹음 시작하기</button>
        </div>

        <div id="dashboardView" style="display:none;">
            <div class="chat-box" style="text-align: left; background: #F8F8FA; padding: 15px;">
                <span style="font-size:12px; font-weight:800; color:#888;">AI 교정 결과</span>
                <div id="dashKoText" style="font-size:15px; font-weight:700; color:#444; margin-top:5px;"></div>
            </div>
            <div class="dashboard-title">
                <span>1단계: 핵심 표현 (3개)</span>
                <span class="progress-count" id="keyProgress">0/3 완료</span>
            </div>
            <div id="keyList"></div>
            <div class="dashboard-title" style="margin-top:25px;">
                <span>2단계: 5단계 변형 드릴</span>
                <span class="progress-count" id="fullProgress">0/1 완료</span>
            </div>
            <div id="fullDrillCard"></div>
            <button class="btn-apple btn-gray" onclick="location.reload()">새로운 이야기 하기</button>
        </div>

        <div id="practiceView" style="display:none;">
            <div class="chat-box">
                <div class="step-badge-container"><div class="step-badge" id="stepBadge">STEP 1</div></div>
                <div class="ko-text" id="pracKoText"></div>
                <div class="audio-wrapper">
                    <button class="btn-audio-main" id="btnPlayTTS" onclick="playTTS()">🔊 <span id="playBtnText">영어 듣기</span></button>
                    <button class="btn-audio-sub" id="btnPauseTTS" style="display:none;" onclick="pauseTTS()">⏸ 멈춤</button>
                    <button class="btn-audio-sub" onclick="resetTTS()">⏪ 처음부터</button>
                </div>
                <div class="en-text-container" id="pracEnText"></div>
                <div class="guide-text" id="pracGuideText">영어를 소리내어 읽어보세요</div>
            </div>
            <button id="pracRecordBtn" class="btn-apple btn-red" onclick="handleQuickRecord(this)">발음 녹음하기</button>
            <button id="pracRetryBtn" class="btn-apple btn-red" style="display:none;" onclick="handleQuickRecord(this)">다시 시도하기</button>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn-apple btn-gray" onclick="goDashboard()">⬅️ 목록으로</button>
                <button id="pracNextBtn" class="btn-apple btn-skip-pale" onclick="nextDrillStage()">건너뛰기 ➡️</button>
            </div>
        </div>
    </div>
    <div id="sec-archive" class="section"><h2>학습 기록</h2><div id="archiveList"></div></div>
</div>

<script>
    let lessonData = null, currentPracticeMode = null;
    let selectedDifficulty = 'intermediate', currentLangMode = 'ko'; 
    let currentEnWordsArray = [], ttsGlobalIndex = 0, ttsIsPlaying = false;
    let mediaRecorder, chunks = [], audioCtx, analyser, dataArray, animationId;
    let synth = window.speechSynthesis, timerInt, progressInt, recSeconds = 0;

    function switchTab(tab) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        if(tab === 'game') document.getElementById('sec-game').classList.add('active');
        else document.getElementById('sec-archive').classList.add('active');
        if(tab === 'archive') renderArchive();
    }

    /* ✨ 애니메이션 헬퍼 */
    function applyBoing(el) {
        el.classList.remove('boing');
        void el.offsetWidth; // 리플로우 강제
        el.classList.add('boing');
    }

    /* ✨ 초기 녹음 (3초 타이머 포함) */
    async function handleMainRecord(btn) {
        applyBoing(btn);
        document.getElementById('introView').style.display = 'none';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const overlay = document.getElementById('countdownOverlay');
            const num = document.getElementById('countdownNumber');
            overlay.style.display = 'flex';
            let count = 3;
            const cntInt = setInterval(() => {
                num.innerText = count;
                if(count === 0) {
                    clearInterval(cntInt);
                    overlay.style.display = 'none';
                    document.getElementById('recordingPanel').style.display = 'flex';
                    startTimer(); initMic(stream, processKoreanAI);
                }
                count--;
            }, 1000);
            num.innerText = count--;
        } catch(e) { alert("마이크 권한 필요"); location.reload(); }
    }

    /* ✨ 드릴 녹음 (타이머 없이 즉시 또잉) */
    async function handleQuickRecord(btn) {
        applyBoing(btn);
        resetTTS();
        document.getElementById('pracRecordBtn').style.display = 'none';
        document.getElementById('pracRetryBtn').style.display = 'none';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // 타이머 없이 0.3초 뒤 즉시 시작 (애니메이션 느낌을 위해 아주 약간의 지연)
            setTimeout(() => {
                document.getElementById('recordingPanel').style.display = 'flex';
                startTimer(); initMic(stream, processPracticeAI);
            }, 350);
        } catch(e) { alert("마이크 권한 필요"); }
    }

    /* 기존 시스템 로직들 */
    function setDifficulty(lvl) { selectedDifficulty = lvl; document.querySelectorAll('.diff-opt:not(.lang-opt)').forEach(el => el.classList.remove('active')); document.getElementById(`diff-${lvl}`).classList.add('active'); }
    function setLangMode(m) { currentLangMode = m; document.querySelectorAll('.lang-opt').forEach(el => el.classList.remove('active')); document.getElementById(`lang-${m}`).classList.add('active'); }

    function updateTTSUI() {
        const playBtn = document.getElementById('btnPlayTTS');
        const pauseBtn = document.getElementById('btnPauseTTS');
        if (ttsIsPlaying) { playBtn.style.display = 'none'; pauseBtn.style.display = 'flex'; } 
        else { playBtn.style.display = 'flex'; pauseBtn.style.display = 'none'; document.getElementById('playBtnText').innerText = ttsGlobalIndex > 0 ? "이어 듣기" : "영어 듣기"; }
    }

    function playTTS() {
        if (ttsIsPlaying) return;
        synth.cancel();
        const textToSpeak = currentEnWordsArray.slice(ttsGlobalIndex).join(" ");
        if (!textToSpeak) return;
        const ut = new SpeechSynthesisUtterance(textToSpeak);
        ut.lang = 'en-US'; ut.rate = 0.85;
        ut.onboundary = (e) => {
            if (e.name === 'word') {
                const upTo = textToSpeak.substring(0, e.charIndex).trim();
                const relIdx = upTo === "" ? 0 : upTo.split(/\s+/).length;
                const actIdx = ttsGlobalIndex + relIdx;
                for (let i = 0; i <= actIdx; i++) {
                    const sp = document.getElementById(`word-${i}`);
                    if (sp && !sp.classList.contains('blurred')) sp.classList.add('active-blue');
                }
            }
        };
        ut.onend = () => { ttsIsPlaying = false; updateTTSUI(); };
        ttsIsPlaying = true; updateTTSUI(); synth.speak(ut);
    }
    function pauseTTS() { synth.cancel(); ttsIsPlaying = false; updateTTSUI(); }
    function resetTTS() { synth.cancel(); ttsIsPlaying = false; ttsGlobalIndex = 0; updateTTSUI(); document.querySelectorAll('.en-word').forEach(el => el.classList.remove('active-blue')); }

    async function processKoreanAI() {
        document.getElementById('recordingPanel').style.display = 'none';
        document.getElementById('loadingUI').style.display = 'block';
        startLoadingBar();
        const b64 = await getBase64Audio();
        try {
            const res = await fetch("/api/openai-proxy", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({audio: b64, action: 'korean', difficulty: selectedDifficulty, lang_mode: currentLangMode}) });
            lessonData = await res.json();
            lessonData.id = Date.now();
            lessonData.completed = { keys: new Array(lessonData.keys.length).fill(false), full: false };
            finishLoadingBar();
            setTimeout(() => { document.getElementById('loadingUI').style.display = 'none'; showDashboard(); }, 500);
        } catch (e) { alert("AI 분석 실패"); location.reload(); }
    }

    function showDashboard() {
        document.getElementById('practiceView').style.display = 'none';
        document.getElementById('dashboardView').style.display = 'block';
        document.getElementById('dashKoText').innerText = lessonData.korean;
        const kDone = lessonData.completed.keys.filter(Boolean).length;
        const fDone = lessonData.completed.full ? 1 : 0;
        document.getElementById('keyProgress').innerText = `${kDone}/3 완료`;
        document.getElementById('fullProgress').innerText = `${fDone}/1 완료`;
        document.getElementById('keyList').innerHTML = lessonData.keys.map((k, idx) => `
            <div class="lesson-card ${lessonData.completed.keys[idx] ? 'mastered' : ''}" onclick="startPractice('key_${idx}_1')">
                <div style="flex:1;"><div class="ko">${k.ko_org}</div><div class="en" style="font-size:15px; font-weight:800; margin-top:4px;">${k.en_org}</div></div>
                <div>${lessonData.completed.keys[idx] ? '✅' : '▶'}</div>
            </div>`).join('');
        document.getElementById('fullDrillCard').innerHTML = `
            <div class="lesson-card ${lessonData.completed.full ? 'mastered' : ''}" onclick="startPractice('full_1')">
                <div style="flex:1;"><div class="ko">전체 문장 5단계 마스터</div><div class="en" style="font-size:15px; font-weight:800; margin-top:4px;">${lessonData.english}</div></div>
                <div>${lessonData.completed.full ? '✅' : '➡️'}</div>
            </div>`;
    }

    function startPractice(mode) { 
        document.getElementById('dashboardView').style.display = 'none'; 
        document.getElementById('practiceView').style.display = 'block'; 
        currentPracticeMode = mode; setupPracticeUI(); 
    }

    function setupPracticeUI() {
        let ko, en, blur, step; resetTTS();
        const nBtn = document.getElementById('pracNextBtn');
        nBtn.className = 'btn-apple btn-skip-pale'; nBtn.innerHTML = '건너뛰기 ➡️';
        if (currentPracticeMode.startsWith('key_')) {
            const p = currentPracticeMode.split('_'); const idx = parseInt(p[1]); step = parseInt(p[2]);
            const k = lessonData.keys[idx];
            if(step === 1) { ko=k.ko_org; en=k.en_org; blur="none"; }
            else if(step === 2) { ko=k.ko_org; en=k.en_org; blur=k.word; }
            else if(step === 3) { ko=k.ko_var; en=k.en_var; blur="none"; }
            else if(step === 4) { ko=k.ko_var; en=k.en_var; blur=k.word; }
            else { ko=k.ko_org; en=k.en_org; blur="all"; }
            document.getElementById('stepBadge').innerText = `표현 마스터 STEP ${step}/5`;
        } else {
            step = parseInt(currentPracticeMode.split('_')[1]);
            const dr = lessonData.drills[step - 1]; ko=dr.ko; en=dr.en_full; blur=dr.blur_part;
            document.getElementById('stepBadge').innerText = `문장 훈련 STEP ${step}/5`;
        }
        document.getElementById('pracKoText').innerText = ko; renderInteractiveWords(en, blur);
        document.getElementById('pracGuideText').innerHTML = "영어를 소리내어 읽어보세요";
        document.getElementById('pracRecordBtn').style.display = 'block'; document.getElementById('pracRetryBtn').style.display = 'none';
    }

    function renderInteractiveWords(text, blur) {
        const cont = document.getElementById('pracEnText'); cont.innerHTML = "";
        currentEnWordsArray = text.split(" ");
        currentEnWordsArray.forEach((word, idx) => {
            const sp = document.createElement('span'); sp.className = "en-word"; sp.innerText = word + " "; sp.id = `word-${idx}`;
            const cl = word.replace(/[^a-zA-Z]/g, '').toLowerCase();
            let shouldBlur = false;
            if (blur === "all") shouldBlur = true;
            else if (blur !== "none" && blur.toLowerCase().includes(cl) && cl.length > 0) shouldBlur = true;
            if (shouldBlur) sp.classList.add('blurred');
            sp.onclick = () => { resetTTS(); ttsGlobalIndex = idx; playTTS(); };
            cont.appendChild(sp);
        });
    }

    async function processPracticeAI() {
        document.getElementById('recordingPanel').style.display = 'none';
        document.getElementById('loadingUI').style.display = 'block';
        startLoadingBar();
        const b64 = await getBase64Audio();
        const res = await fetch("/api/openai-proxy", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({audio: b64, action: 'evaluate', target_english: document.getElementById('pracEnText').innerText}) });
        const data = await res.json();
        finishLoadingBar();
        setTimeout(() => {
            document.getElementById('loadingUI').style.display = 'none';
            const sc = data.score || 0;
            if (sc >= 70) {
                const nBtn = document.getElementById('pracNextBtn');
                nBtn.className = 'btn-apple btn-blue btn-glow'; nBtn.innerHTML = '다음 단계 ➡️';
                document.getElementById('pracGuideText').innerHTML = `<span style="color:var(--master-green); font-weight:900;">🎉 통과! (${sc}점)</span><br>${data.feedback}`;
            } else {
                document.getElementById('pracRetryBtn').style.display = 'block';
                document.getElementById('pracGuideText').innerHTML = `<span style="color:var(--ios-red); font-weight:900;">💪 다시 시도! (${sc}점)</span><br>${data.feedback}`;
            }
        }, 300);
    }

    function nextDrillStage() {
        resetTTS();
        const p = currentPracticeMode.split('_'); const ns = parseInt(p[p.length - 1]) + 1;
        if (currentPracticeMode.startsWith('key_')) { if(ns > 5) { lessonData.completed.keys[parseInt(p[1])] = true; goDashboard(); } else { currentPracticeMode = `key_${p[1]}_${ns}`; setupPracticeUI(); } } 
        else { if(ns > 5) { lessonData.completed.full = true; goDashboard(); } else { currentPracticeMode = `full_${ns}`; setupPracticeUI(); } }
    }
    function goDashboard() { resetTTS(); saveToArchive(); document.getElementById('practiceView').style.display = 'none'; showDashboard(); }

    function saveToArchive() {
        if(!lessonData) return;
        let arc = JSON.parse(localStorage.getItem('archive_v13')) || [];
        const prog = lessonData.completed.keys.filter(Boolean).length + (lessonData.completed.full ? 1 : 0);
        const exIdx = arc.findIndex(a => a.id === lessonData.id);
        if (exIdx !== -1) { arc[exIdx].data = lessonData; arc[exIdx].mastered = (prog === 4); }
        else { arc.unshift({ id: lessonData.id, date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' }), title: lessonData.title, mastered: (prog === 4), data: lessonData }); }
        localStorage.setItem('archive_v13', JSON.stringify(arc));
    }

    function renderArchive() {
        const list = document.getElementById('archiveList');
        const arc = JSON.parse(localStorage.getItem('archive_v13')) || [];
        if(arc.length === 0) { list.innerHTML = "<p style='text-align:center; color:#888;'>기록이 없습니다.</p>"; return; }
        list.innerHTML = arc.map(a => {
            const pr = a.data.completed.keys.filter(Boolean).length + (a.data.completed.full ? 1 : 0);
            let color = '#8E8E93';
            if(pr === 2) color = '#FFD60A'; if(pr === 3) color = '#34C759'; if(pr === 4) color = '#007AFF';
            return `<div class="archive-bubble" onclick="loadFromArchive(${a.id})">
                <div class="archive-header"><span>${a.date}</span><span style="color:${color}">${pr === 4 ? '🏆 완벽' : '⏳ 진행'}(${pr}/4)</span></div>
                <div class="archive-title">${a.title}</div><div style="font-size:13px; color:#888; margin-top:5px;">${a.data.english}</div>
            </div>`;
        }).join('');
    }
    function loadFromArchive(id) { const arc = JSON.parse(localStorage.getItem('archive_v13')) || []; const item = arc.find(a => a.id === id); if(item) { lessonData = item.data; switchTab('game'); showDashboard(); } }

    function startTimer() { recSeconds = 0; clearInterval(timerInt); timerInt = setInterval(() => { recSeconds++; const m = String(Math.floor(recSeconds/60)).padStart(2,'0'); const s = String(recSeconds%60).padStart(2,'0'); document.getElementById('recTimer').innerText=`${m}:${s}`; }, 1000); }
    function startLoadingBar() { let w = 0; clearInterval(progressInt); progressInt = setInterval(() => { w += 5; if(w>95) w=95; document.getElementById('progressBar').style.width = w+'%'; }, 200); }
    function finishLoadingBar() { clearInterval(progressInt); document.getElementById('progressBar').style.width = '100%'; }
    function initMic(stream, cb) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); analyser = audioCtx.createAnalyser(); audioCtx.createMediaStreamSource(stream).connect(analyser); analyser.fftSize = 64; dataArray = new Uint8Array(analyser.frequencyBinCount); mediaRecorder = new MediaRecorder(stream); chunks = []; mediaRecorder.ondataavailable = e => chunks.push(e.data); mediaRecorder.onstop = cb; mediaRecorder.start(); drawWave(); }
    function drawWave() { animationId = requestAnimationFrame(drawWave); analyser.getByteFrequencyData(dataArray); const bars = document.querySelectorAll('.wave-bar'); bars.forEach((bar, i) => { bar.style.height = Math.max(4, (dataArray[i % dataArray.length] / 128.0) * 45) + 'px'; }); }
    function stopAnyRecording() { clearInterval(timerInt); if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop(); cancelAnimationFrame(animationId); if(audioCtx) audioCtx.close(); }
    async function getBase64Audio() { const blob = new Blob(chunks, { type: 'audio/m4a' }); return new Promise(resolve => { const r = new FileReader(); r.onloadend = () => resolve(r.result.split(',')[1]); r.readAsDataURL(blob); }); }
</script>
