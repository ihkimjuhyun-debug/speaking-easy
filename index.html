<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyGlot Master: Stable V41</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --master-green: #34C759;
            --skip-blue: #B3D4FF; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; padding-bottom: 40px; }
        
        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 0.5px solid #D1D1D6; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 14px; font-weight: 800; color: #8E8E93; cursor: pointer; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .speech-bubble { background: #fff; border-radius: 20px; padding: 22px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .bubble-ko { font-size: 20px; font-weight: 900; text-align: center; line-height: 1.4; }
        .en-text-container { font-size: 24px; font-weight: 900; line-height: 1.35; color: var(--apple-navy); }
        .en-word { display: inline-block; margin-right: 6px; margin-bottom: 6px; cursor: pointer; }
        .en-word.active-blue { color: var(--ios-blue) !important; }
        .en-word.dimmed { color: #D1D1D6 !important; }
        .en-word.blurred { background: #E5E5EA; color: transparent !important; border-radius: 6px; padding: 0 5px; }

        .lesson-card { background: #fff; border: 2px solid #EAEAEA; border-radius: 16px; padding: 16px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .lesson-card.mastered { border-color: var(--master-green); background: #F2FCF4; }

        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .btn-red { background: var(--ios-red); color: white; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-gray { background: #E5E5EA; color: var(--apple-navy); }
        .btn-skip-pale { background: var(--skip-blue); color: #0056B3; font-weight: 900; }

        @keyframes boing { 0% { transform: scale(1); } 40% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .boing-active { animation: boing 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .fixed-action-area { position: sticky; bottom: 10px; z-index: 999; padding-top: 10px; background: var(--ios-bg); }
        .waveform-container { display: flex; align-items: center; gap: 3.5px; height: 40px; flex: 2; overflow: hidden; }
        .wave-bar { width: 3.5px; background: var(--ios-red); border-radius: 2px; height: 4px; transition: height 0.05s ease; }
        
        #globalDictTooltip { display: none; position: absolute; background: rgba(28, 28, 30, 0.95); color: #fff; padding: 18px; border-radius: 16px; z-index: 99999; width: max-content; max-width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    </style>
</head>
<body onclick="hideDictTooltip()">

<div id="globalDictTooltip" onclick="event.stopPropagation();">
    <div id="dictWord" style="font-size:22px; font-weight:900;"></div>
    <div id="dictKo" style="font-weight:800; font-size:16px; margin-top:5px; color:#fff;"></div>
</div>

<div class="container">
    <nav class="nav-bar">
        <button class="tab active" id="tab-game" onclick="switchTab('game')">GAME START</button>
        <button class="tab" id="tab-archive" onclick="switchTab('archive')">STORAGE</button>
    </nav>

    <div id="sec-game" class="section active">
        <div id="introView">
            <div class="speech-bubble">
                <div class="bubble-ko">실생활/비즈니스 상황에서<br>자주 쓰는 말을 해보세요</div>
            </div>
            <button id="mainRecordBtn" class="btn-apple btn-blue" onclick="startMainRecording(this)">녹음 시작</button>
        </div>

        <div id="dashboardView" style="display:none;">
            <div class="speech-bubble">
                <div class="en-text-container" id="dashEnText"></div>
                <div id="dashKoText" style="margin-top:10px; font-weight:700; color:#666;"></div>
            </div>
            <div class="dashboard-title">1. 덩어리 훈련 <span id="keyProgress">0/3</span></div>
            <div id="keyList"></div>
            <div class="dashboard-title" style="margin-top:20px;">2. 핵심 단어 <span id="vocabProgress">0/3</span></div>
            <div id="vocabList"></div>
            <button class="btn-apple btn-gray" onclick="location.reload()">새로운 이야기</button>
        </div>

        <div id="practiceView" style="display:none;">
            <div class="speech-bubble">
                <div class="bubble-ko" id="pracKoText"></div>
                <div class="en-text-container" id="pracEnText" style="margin-top:20px;"></div>
            </div>
            <div class="fixed-action-area">
                <button id="pracRecordBtn" class="btn-apple btn-red" onclick="togglePracRecording(this)">녹음 시작</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn-apple btn-gray" onclick="goDashboard()">← 목록</button>
                    <button id="nextBtn" class="btn-apple btn-skip-pale" onclick="nextStep()" style="display:none;">다음 단계 →</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sec-archive" class="section">
        <h2 style="font-weight:900;">학습 보관소</h2>
        <div id="archiveList"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'archive_poly_v41';
    let lessonData = null, currentMode = null, currentStep = 1;
    let mediaRecorder, chunks = [], synth = window.speechSynthesis;
    let isRecording = false;

    // 🌟 핵심 수리: 음성 인식 정밀화 로직
    async function processSpeechAI(action, targetText = "") {
        const b64 = await getBase64Audio();
        try {
            const res = await fetch("/api/openai-proxy", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ audio: b64, action, target_english: targetText, difficulty: 'intermediate' })
            });
            const data = await res.json();
            if (action === 'korean') {
                lessonData = data;
                lessonData.id = Date.now();
                lessonData.completed = { keys: [false, false, false], vocab: [false, false, false] };
                saveArchive();
                showDashboard();
            } else {
                showResult(data);
            }
        } catch (e) { alert("연결 오류"); }
    }

    function showDashboard() {
        document.getElementById('introView').style.display = 'none';
        document.getElementById('practiceView').style.display = 'none';
        document.getElementById('dashboardView').style.display = 'block';
        
        document.getElementById('dashEnText').innerText = lessonData.english;
        document.getElementById('dashKoText').innerText = lessonData.korean;
        
        renderList('keyList', lessonData.keys, 'key');
        renderList('vocabList', lessonData.vocab, 'vocab');
        
        document.getElementById('keyProgress').innerText = `${lessonData.completed.keys.filter(Boolean).length}/3`;
        document.getElementById('vocabProgress').innerText = `${lessonData.completed.vocab.filter(Boolean).length}/3`;
    }

    function renderList(id, items, type) {
        const container = document.getElementById(id);
        container.innerHTML = items.map((item, idx) => `
            <div class="lesson-card ${lessonData.completed[type][idx] ? 'mastered' : ''}" onclick="startPractice('${type}', ${idx})">
                <div>
                    <div style="font-weight:800; font-size:18px;">${item.phrase || item.word}</div>
                    <div style="font-size:14px; color:#888;">${item.ko_org || item.meaning}</div>
                </div>
                <div>${lessonData.completed[type][idx] ? '✅' : '▶'}</div>
            </div>
        `).join('');
    }

    function startPractice(type, idx) {
        currentMode = { type, idx };
        currentStep = 1;
        document.getElementById('dashboardView').style.display = 'none';
        document.getElementById('practiceView').style.display = 'block';
        setupPracUI();
    }

    function setupPracUI() {
        const item = lessonData[currentMode.type][currentMode.idx];
        document.getElementById('pracKoText').innerText = item.ko_org || item.meaning;
        document.getElementById('pracEnText').innerText = item.phrase || item.word;
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('pracRecordBtn').innerText = "녹음 시작";
    }

    async function togglePracRecording(btn) {
        if (!isRecording) {
            isRecording = true;
            btn.innerText = "■ 종료 (인식 중...)";
            btn.classList.add('glow-active');
            startMic();
        } else {
            isRecording = false;
            btn.innerText = "분석 중...";
            btn.classList.remove('glow-active');
            stopMic(() => {
                const target = lessonData[currentMode.type][currentMode.idx].phrase || lessonData[currentMode.type][currentMode.idx].word;
                processSpeechAI('evaluate', target);
            });
        }
    }

    function showResult(data) {
        alert(`점수: ${data.score}\n인식내용: ${data.recognized_text}\n${data.feedback}`);
        if (data.score >= 70) {
            lessonData.completed[currentMode.type][currentMode.idx] = true;
            document.getElementById('nextBtn').style.display = 'block';
            saveArchive();
        }
    }

    function nextStep() {
        goDashboard();
    }

    function goDashboard() {
        showDashboard();
    }

    // 마이크 로직
    async function startMic() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.start();
    }

    function stopMic(callback) {
        mediaRecorder.onstop = callback;
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }

    async function getBase64Audio() {
        const blob = new Blob(chunks, { type: 'audio/webm' });
        return new Promise(resolve => {
            const r = new FileReader();
            r.onloadend = () => resolve(r.result.split(',')[1]);
            r.readAsDataURL(blob);
        });
    }

    function saveArchive() {
        let arc = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        const idx = arc.findIndex(a => a.id === lessonData.id);
        if (idx > -1) arc[idx] = lessonData; else arc.unshift(lessonData);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(arc));
    }

    function startMainRecording(btn) {
        if (!isRecording) {
            isRecording = true;
            btn.innerText = "말씀을 끝내고 버튼을 눌러주세요";
            startMic();
        } else {
            isRecording = false;
            btn.innerText = "분석 중...";
            stopMic(() => processSpeechAI('korean'));
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('sec-' + tab).classList.add('active');
        if (tab === 'archive') renderArchive();
    }

    function renderArchive() {
        const arc = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        document.getElementById('archiveList').innerHTML = arc.map(a => `
            <div class="lesson-card" onclick="loadArchive(${a.id})">
                <div><b>${a.title_ko}</b><br><small>${a.english}</small></div>
            </div>
        `).join('');
    }

    function loadArchive(id) {
        const arc = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        lessonData = arc.find(a => a.id === id);
        switchTab('game');
        showDashboard();
    }
</script>
</body>
</html>
