<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyGlot Master: Final V22 Ultimate</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --master-green: #34C759;
            --skip-blue: #B3D4FF; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; padding-bottom: 40px; position: relative; }
        
        @keyframes boing { 0% { transform: scale(1); } 40% { transform: scale(1.08); } 100% { transform: scale(1); } }
        .boing-active { animation: boing 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 🔥 완전 수정: glow-active에서 scale 완전 제거 → 박스가 움직이지 않음 */
        .glow-active { 
            box-shadow: 0 0 25px rgba(255, 59, 48, 0.85) !important; 
            border: 2px solid var(--ios-red) !important; 
            background: var(--ios-red) !important; 
            color: white !important; 
            transition: box-shadow 0.3s ease; 
        }

        @keyframes glowPulseWhite { 0% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.4); } 100% { box-shadow: 0 0 22px rgba(255, 255, 255, 1); } }
        .btn-glow { animation: glowPulseWhite 1.2s infinite alternate; }

        @keyframes blackPulse { 0% { box-shadow: 0 0 10px rgba(0,0,0,0.4); } 100% { box-shadow: 0 0 30px rgba(0,0,0,0.9); } }
        .black-glow { animation: blackPulse 1.5s infinite alternate !important; border: 2.5px solid #1C1C1E !important; background: #1C1C1E !important; color: white !important; }

        .nav-bar { display: flex; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 0.5px solid #D1D1D6; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 14px; font-weight: 800; color: #8E8E93; cursor: pointer; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; }
        .section.active { display: block; }

        .bubble-container { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .speech-bubble { background: #fff; border-radius: 20px 20px 20px 4px; padding: 22px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 2px solid transparent; }

        .en-text-container { font-size: 28px; font-weight: 900; line-height: 1.35; color: var(--apple-navy); }
        .en-word { display: inline-block; margin-right: 6px; margin-bottom: 6px; transition: color 0.2s; }
        .en-word.active-blue { color: var(--ios-blue) !important; }
        .en-word.dimmed { color: #D1D1D6 !important; }
        .en-word.blurred { background: #E5E5EA; color: transparent !important; border-radius: 6px; padding: 0 5px; cursor: pointer; }

        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; transition: all 0.2s; }
        .btn-red { background: var(--ios-red); color: white; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-gray { background: #E5E5EA; color: var(--apple-navy); }
        .btn-skip-pale { background: var(--skip-blue); color: #0056B3; font-weight: 900; }

        /* ==================== 메인 녹음 패널 ==================== */
        #recordingPanelMain { 
            display: none; background: #fff; border-radius: 24px; padding: 24px 20px; 
            align-items: center; justify-content: space-between; border: 3px solid var(--ios-red); 
            box-shadow: 0 15px 35px rgba(255,59,48,0.25); position: fixed; bottom: 30px; 
            left: 50%; transform: translateX(-50%); width: calc(100% - 40px); max-width: 460px; 
            z-index: 9999; box-sizing: border-box; 
        }

        /* ==================== PRACTICE 녹음 패널 (완전 새로 설계) ==================== */
        #pracRecordingPanel {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 460px;
            background: #fff;
            border-radius: 28px;
            border: 3px solid var(--ios-red);
            box-shadow: 0 20px 45px rgba(255,59,48,0.3);
            padding: 28px 24px;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
        }
        .prac-rec-header { display: flex; justify-content: space-between; align-items: center; }
        .prac-rec-timer { font-size: 34px; font-weight: 900; letter-spacing: -1px; color: #111; }
        .prac-rec-wave { 
            display: flex; 
            align-items: flex-end; 
            gap: 3px; 
            height: 72px; 
            padding: 0 8px;
        }
        .prac-wave-bar { 
            width: 6px; 
            background: linear-gradient(#FF3B30, #FF7A6E); 
            border-radius: 9999px; 
            transition: height 0.05s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* ==================== 분석 게이지 ==================== */
        #loadingUI { 
            display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: calc(100% - 40px); max-width: 460px; background: #fff; border-radius: 24px; 
            padding: 24px 28px; box-shadow: 0 15px 35px rgba(0,122,255,0.25); border: 3px solid var(--ios-blue); 
            z-index: 9999; box-sizing: border-box;
        }
        .progress-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; font-weight: 800; color: var(--ios-blue); }
        .progress-bg { width: 100%; height: 14px; background: #E5E5EA; border-radius: 9999px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #007AFF, #00C2FF); transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        #countdownOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .countdown-num { font-size: 120px; font-weight: 900; color: var(--ios-blue); animation: popIn 1s infinite; }
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 30% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0; } }

        .result-bubble-container { text-align: left; margin-top: 25px; }
        .score-bubble { background: #F8F8FA; border-radius: 14px; padding: 15px 20px; border: 1px solid #EAEAEA; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        .score-num { font-size: 40px; font-weight: 900; color: var(--ios-blue); line-height: 1; }
        .score-msg { font-size: 15px; font-weight: 700; color: #444; line-height: 1.4; flex: 1; }
        .ans-bubble { background: #fff; border-radius: 14px; padding: 18px; border: 1px solid #EAEAEA; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .ans-text { font-size: 17px; font-weight: 800; color: var(--apple-navy); line-height: 1.4; margin-bottom: 12px; }
        .fb-text { font-size: 14px; font-weight: 700; color: #666; line-height: 1.5; border-top: 1px solid #EEE; padding-top: 12px; }

        #mcqArea { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .mcq-btn { background: #F2F2F7; border: none; padding: 15px; border-radius: 14px; font-weight: 800; font-size: 16px; cursor: pointer; color: var(--apple-navy); transition: 0.2s; text-align: center;}

        .archive-bubble { background: #fff; border-radius: 24px 24px 24px 6px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); cursor: pointer; transition: transform 0.2s; border: 2px solid transparent; }
        .archive-header { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 800; margin-bottom: 8px; }
        .archive-title { font-size: 18px; font-weight: 900; color: var(--dial-navy); line-height: 1.3; }
        .icon-btn { font-size: 18px; cursor: pointer; padding: 4px; opacity: 0.8; transition: transform 0.1s; }
        .icon-btn:active { transform: scale(0.8); }

        #globalDictTooltip { 
            display: none; position: absolute; background: rgba(0,0,0,0.88); backdrop-filter: blur(5px); 
            color: #fff; padding: 16px 20px; border-radius: 16px; font-size: 14px; z-index: 99999; 
            width: max-content; max-width: 85vw; box-sizing: border-box; 
            word-wrap: break-word; white-space: pre-wrap; line-height: 1.4;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); animation: fadeIn 0.2s; margin-top: 8px; 
        }
        
        .phrase-title-ko { font-size: 22px; font-weight: 900; text-align: center; margin-bottom: 4px; }
        .phrase-subtitle-en { font-size: 15px; font-weight: 700; color: #007AFF; text-align: center; margin-bottom: 12px; }
    </style>
</head>
<body onclick="hideDictTooltip()">

<div id="countdownOverlay">
    <div style="font-size: 20px; font-weight: 800; color: #888; margin-bottom: 20px;">준비하세요!</div>
    <div class="countdown-num" id="countdownNumber">3</div>
</div>

<div id="globalDictTooltip" onclick="event.stopPropagation();">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
        <div id="dictWord" style="font-size:19px; font-weight:900; color:var(--skip-blue);"></div>
        <div id="dictTTSBtn" style="font-size:20px; cursor:pointer; padding:2px 8px; border-radius:8px; background:rgba(255,255,255,0.1); margin-left:15px;" onclick="playDictWordTTS(event)">🔊</div>
    </div>
    <div id="dictKo" style="font-weight:800; font-size:15px; margin-bottom:2px;"></div>
    <div style="color:#aaa; font-size:13px; margin-bottom:10px;"><span id="dictPos"></span> | <span id="dictPhonetics"></span></div>
    <div id="dictExp" style="margin-bottom:8px; color:#ddd; font-style:italic; border-left:2px solid var(--ios-blue); padding-left:8px;"></div>
    <div id="dictForms" style="color:#999; font-size:12px;"></div>
</div>

<div class="container">
    <nav class="nav-bar">
        <button class="tab active" id="tab-game" onclick="switchTab('game')">GAME START</button>
        <button class="tab" id="tab-archive" onclick="switchTab('archive')">STORAGE</button>
    </nav>

    <div id="sec-game" class="section active">
        <!-- 메인 녹음 패널 -->
        <div id="recordingPanelMain">
            <div class="waveform-container" id="mainWaveform"><script>for(let i=0; i<25; i++) document.write('<div class="wave-bar" style="width:4px;background:#FF3B30;border-radius:9999px;height:8px;"></div>');</script></div>
            <div class="stopwatch" id="mainRecTimer">00:00</div>
            <button onclick="stopMainRecording(this)" style="background:var(--ios-red); color:white; border:none; padding:12px 24px; border-radius:9999px; font-weight:800;">완료</button>
        </div>

        <!-- PRACTICE 녹음 패널 (완전 독립형) -->
        <div id="pracRecordingPanel">
            <div class="prac-rec-header">
                <div class="prac-rec-timer" id="pracRecTimerBig">00:00</div>
                <button onclick="stopPracticeRecording()" style="background:var(--ios-red); color:white; border:none; padding:12px 24px; border-radius:9999px; font-weight:800;">완료</button>
            </div>
            <div class="prac-rec-wave" id="pracWaveContainer">
                <script>for(let i=0; i<32; i++) document.write('<div class="prac-wave-bar"></div>');</script>
            </div>
        </div>

        <!-- 분석 중 UI -->
        <div id="loadingUI">
            <div class="progress-header">
                <span style="font-size: 15px;">AI가 분석 중입니다...</span>
                <span id="progressText" style="font-size: 18px; font-family: monospace;">0%</span>
            </div>
            <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <!-- Intro -->
        <div id="introView">
            <div class="speech-bubble" style="text-align: center; margin-bottom:20px;">
                <div style="font-size: 40px; margin-bottom: 10px;">🎙️</div>
                <div id="introMainTitle" style="font-size: 20px; font-weight: 900; margin-bottom: 25px;">당신의 취미와 일상에 대하여<br>말해보세요!</div>
                <div class="diff-control">
                    <div class="diff-opt" onclick="setDifficulty('beginner', this)" id="diff-beginner">🌱 초급</div>
                    <div class="diff-opt active" onclick="setDifficulty('intermediate', this)" id="diff-intermediate">🌿 중급</div>

                </div>
                <div class="diff-control" style="background: #F2F2F7;">
                    <div class="diff-opt lang-opt active" onclick="setLangMode('ko')" id="lang-ko">🇰🇷 100% 한국어</div>
                    <div class="diff-opt lang-opt" onclick="setLangMode('focus90')" id="lang-focus90">🇺🇸 영어 90%</div>
                </div>

            <button class="btn-apple btn-red" onclick="startMainRecording(this)" style="background: var(--ios-blue);">녹음 시작하기</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboardView" style="display:none;">
            <div class="speech-bubble" id="dashMainBubble" style="margin-bottom: 20px;">
                <div class="dash-label" id="dashLabelText">내 이야기 (AI 교정됨)</div>
                <div class="en-text-container" id="dashEnText" style="font-size: 22px; margin-bottom:0;"></div>
                <div class="bubble-ko" id="dashKoText" style="font-size: 15px; font-weight: 700; margin-top: 8px; line-height: 1.4; border-top: 1px solid #EAEAEA; padding-top: 12px;"></div>
            </div>
            
            <div class="dashboard-title"><span>1단계: 덩어리 표현 (3개)</span><span class="progress-count" id="keyProgress">0/3</span></div>
            <div id="keyList"></div>
            
            <div class="dashboard-title" style="margin-top:20px;"><span>2단계: 핵심 단어 8코스 (3개)</span><span class="progress-count" id="vocabProgress">0/3</span></div>
            <div id="vocabList"></div>

            <div class="dashboard-title" style="margin-top:20px;"><span>3단계: 전체 문장 드릴</span><span class="progress-count" id="fullProgress">0/1</span></div>
            <div id="fullDrillCard"></div>
            
            <button class="btn-apple btn-gray" onclick="handleReload(this)">새로운 이야기 하기</button>
        </div>

        <!-- Practice View -->
        <div id="practiceView" style="display:none;">
            <div class="step-badge-container"><div class="step-badge" id="stepBadge">STEP 1</div></div>
            
            <div class="bubble-container">
                <div class="speech-bubble" style="padding: 24px 20px; text-align: center;">
                    <div id="pracKoTitle" class="phrase-title-ko"></div>
                    <div id="pracEnSubtitle" class="phrase-subtitle-en"></div>
                </div>
                
                <div class="audio-bubble">
                    <button class="btn-audio-main" id="btnPlayTTS" onclick="handlePlayTTS(this)">🔊 <span id="playBtnText">영어 듣기</span></button>
                    <button class="btn-audio-sub" id="btnPauseTTS" style="display:none;" onclick="handlePauseTTS(this)">⏸ 멈춤</button>

                </div>

                <div class="speech-bubble" style="padding: 25px 20px;">
                    <div class="en-text-container" id="pracEnText" style="margin-bottom: 0;"></div>

    <!-- STORAGE SECTION -->
    <div id="sec-archive" class="section">

        <div class="diff-control" style="margin-bottom: 20px;">
            <div class="diff-opt active" id="arc-tab-story" onclick="switchArcTab('story')">📖 전체 이야기</div>
            <div class="diff-opt" id="arc-tab-vocab" onclick="switchArcTab('vocab')">📝 내 단어장</div>
        </div>

        <div id="archiveListStory"></div>
        <div id="archiveListVocab" style="display:none; flex-direction:column; gap:10px;"></div>

<script>
    // ==================== 전역 변수 ====================
    let lessonData = null, currentPracticeMode = null;
    let selectedDifficulty = 'intermediate', currentLangMode = 'ko'; 
    let currentEnWordsArray = [], ttsGlobalIndex = 0, ttsIsPlaying = false;
    let mediaRecorder, chunks = [], audioCtx, analyser, dataArray, animationId;
    let activeStream = null; 
    let synth = window.speechSynthesis, timerInt, progressInt, recSeconds = 0;
    let hiddenTTSWord = ""; 

    // ==================== 공통 함수 ====================
    function stopMicEngine() {
        if (activeStream) { activeStream.getTracks().forEach(track => track.stop()); activeStream = null; }
        if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        if (audioCtx && audioCtx.state !== 'closed') audioCtx.close();
        clearInterval(timerInt); cancelAnimationFrame(animationId);
    }

    function switchTab(tab) {
        resetTTS(); hideDictTooltip(); stopMicEngine();
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`sec-${tab}`).classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
        if (tab === 'archive') renderArchive();
    }

    function applyBoing(el) { 
        if (!el) return; 
        el.classList.remove('boing-active'); 
        void el.offsetWidth; 
        el.classList.add('boing-active'); 
    }

    function handleReload(btn) { 
        applyBoing(btn); 
        stopMicEngine(); 
        setTimeout(() => location.reload(), 200); 
    }

    function setDifficulty(lvl, el) {
        selectedDifficulty = lvl;
        document.querySelectorAll('.diff-opt:not(.lang-opt)').forEach(o => o.classList.remove('active'));
        if (el) el.classList.add('active');
    }

    function setLangMode(mode) {
        currentLangMode = mode;
        document.querySelectorAll('.lang-opt').forEach(el => el.classList.remove('active'));
        document.getElementById(`lang-${mode}`).classList.add('active');
    }

    async function showCountdown() {
        return new Promise(resolve => {
            const overlay = document.getElementById('countdownOverlay');
            const num = document.getElementById('countdownNumber');
            overlay.style.display = 'flex'; 
            let count = 3;
            const cntInt = setInterval(() => { 
                num.innerText = count; 
                if (count === 0) { clearInterval(cntInt); overlay.style.display = 'none'; resolve(); } 
                count--; 
            }, 1000);
        });
    }

    // ==================== 녹음 함수 (완전 수정) ====================
    async function startMainRecording(btn) {
        applyBoing(btn); 
        btn.classList.add('glow-active'); 
        stopMicEngine();
        setTimeout(async () => {
            btn.classList.remove('glow-active'); 
            document.getElementById('introView').style.display = 'none';
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                await showCountdown(); 
                document.getElementById('recordingPanelMain').style.display = 'flex';
                recSeconds = 0; 
                clearInterval(timerInt); 
                document.getElementById('mainRecTimer').innerText = "00:00";
                timerInt = setInterval(() => { 
                    recSeconds++; 
                    document.getElementById('mainRecTimer').innerText = `${String(Math.floor(recSeconds/60)).padStart(2,'0')}:${String(recSeconds%60).padStart(2,'0')}`; 
                }, 1000);
                const bars = document.getElementById('mainWaveform').querySelectorAll('.wave-bar');
                initMicWithStream(activeStream, processKoreanAI, bars);
            } catch(e) { alert("마이크 권한이 필요합니다."); location.reload(); }
        }, 300); 
    }

    function stopMainRecording() { stopMicEngine(); document.getElementById('recordingPanelMain').style.display = 'none'; }

    // PRACTICE 녹음 (파형만 움직이게 완전 격리)
    async function toggleQuickRecord(btn) {
        if (btn.dataset.recording === "true") {
            stopPracticeRecording();
            return;
        }
        
        stopMicEngine(); 
        applyBoing(btn); 
        btn.dataset.recording = "true"; 
        btn.innerHTML = "⏹ 녹음 중...";
        btn.classList.add('glow-active'); 
        
        try {
            activeStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('pracRecordingPanel').style.display = 'flex';
            
            recSeconds = 0; 
            clearInterval(timerInt); 
            document.getElementById('pracRecTimerBig').innerText = "00:00";
            timerInt = setInterval(() => { 
                recSeconds++; 
                document.getElementById('pracRecTimerBig').innerText = `${String(Math.floor(recSeconds/60)).padStart(2,'0')}:${String(recSeconds%60).padStart(2,'0')}`; 
            }, 1000);

            const bars = document.getElementById('pracWaveContainer').querySelectorAll('.prac-wave-bar');
            initMicWithStream(activeStream, processPracticeAI, bars);
        } catch(e) { 
            alert("마이크 권한이 필요합니다."); 
            resetRecordBtn();
        }
    }

    function stopPracticeRecording() {
        stopMicEngine();
        const btn = document.getElementById('pracRecordBtn');
        btn.dataset.recording = "false"; 
        btn.innerHTML = "발음 녹음하기"; 
        btn.classList.remove('glow-active'); 
        document.getElementById('pracRecordingPanel').style.display = 'none';
    }

    function resetRecordBtn() {
        const btn = document.getElementById('pracRecordBtn');
        btn.dataset.recording = "false"; 
        btn.innerHTML = "발음 녹음하기"; 
        btn.classList.remove('glow-active'); 
    }

    // ==================== 파형 애니메이션 (안정화) ====================
    function initMicWithStream(stream, cb, barsElements) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        analyser.fftSize = 128;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = cb;
        mediaRecorder.start();
        drawWaveSpecific(barsElements);
    }

    function drawWaveSpecific(bars) {
        animationId = requestAnimationFrame(() => drawWaveSpecific(bars));
        analyser.getByteFrequencyData(dataArray);
        bars.forEach((bar, i) => {
            const height = Math.max(8, (dataArray[i % dataArray.length] / 128) * 68);
            bar.style.height = `${height}px`;
        });
    }

    async function getBase64Audio() {
        const blob = new Blob(chunks);
        return new Promise(resolve => {
            const r = new FileReader();
            r.onloadend = () => resolve(r.result.split(',')[1]);
            r.readAsDataURL(blob);
        });
    }

    // ==================== STORAGE 완전 복구 ====================
    function renderArchive() {
        const listStory = document.getElementById('archiveListStory');
        const listVocab = document.getElementById('archiveListVocab');
        let arc = JSON.parse(localStorage.getItem('archive_poly_v22')) || [];
        
        if (arc.length === 0) {
            listStory.innerHTML = `<p style="text-align:center; color:#888; padding:40px 20px;">아직 저장된 기록이 없습니다.<br>첫 번째 이야기를 녹음해보세요!</p>`;
            listVocab.innerHTML = `<p style="text-align:center; color:#888; padding:40px 20px;">저장된 단어가 없습니다.</p>`;
            return;
        }

        // 정렬 (starred 우선)
        arc.sort((a, b) => (b.starred ? 1 : 0) - (a.starred ? 1 : 0));

        let storyHTML = '';
        arc.forEach(a => {
            const pr = a.data.completed.keys.filter(Boolean).length + (a.data.completed.full ? 1 : 0) + a.data.completed.vocab.filter(Boolean).length;
            const isMastered = pr === 7;
            storyHTML += `
            <div class="archive-bubble" onclick="loadFromArchive(${a.id}, this)" style="background:${isMastered ? '#1C1C1E' : '#fff'}; color:${isMastered ? '#fff' : '#111'};">
                <div class="archive-header">
                    <div><span>${a.date}</span></div>
                    <div style="display:flex; gap:12px;">
                        <span class="icon-btn" onclick="event.stopImmediatePropagation(); toggleStar(event, ${a.id})">${a.starred ? '⭐' : '☆'}</span>
                        <span class="icon-btn" onclick="event.stopImmediatePropagation(); deleteArchive(event, ${a.id})">🗑️</span>
                    </div>
                </div>
                <div style="font-size:13px; opacity:0.7;">${a.title_ko}</div>
                <div class="archive-title" style="${isMastered ? 'color:#fff;' : ''}">${a.title_en}</div>
                <div style="text-align:right; margin-top:8px; font-size:13px;">${pr}/7 완료</div>
            </div>`;
        });
        listStory.innerHTML = storyHTML;

        let vocabHTML = '';
        arc.forEach(a => {
            if (a.data && a.data.vocab) {
                a.data.vocab.forEach((v, idx) => {
                    const mastered = a.data.completed.vocab[idx];
                    vocabHTML += `
                    <div class="lesson-card" onclick="loadVocabFromArchive(${a.id}, ${idx}, this)" style="margin-bottom:8px;">
                        <div style="flex:1;">
                            <div style="font-size:13px; color:#888;">${v.pos} | ${v.phonetics}</div>
                            <div style="font-size:20px; font-weight:900;">${v.word}</div>
                            <div style="font-size:15px; color:#444;">${v.meaning}</div>
                        </div>
                        <div style="font-size:28px;">${mastered ? '✅' : '▶️'}</div>
                    </div>`;
                });
            }
        });
        listVocab.innerHTML = vocabHTML || `<p style="text-align:center; color:#888; padding:40px 20px;">저장된 단어가 없습니다.</p>`;
    }

    function toggleStar(e, id) {
        e.stopImmediatePropagation();
        let arc = JSON.parse(localStorage.getItem('archive_poly_v22')) || [];
        const item = arc.find(a => a.id === id);
        if (item) item.starred = !item.starred;
        localStorage.setItem('archive_poly_v22', JSON.stringify(arc));
        renderArchive();
    }

    function deleteArchive(e, id) {
        e.stopImmediatePropagation();
        if (!confirm("이 기록을 영구 삭제하시겠습니까?")) return;
        let arc = JSON.parse(localStorage.getItem('archive_poly_v22')) || [];
        arc = arc.filter(a => a.id !== id);
        localStorage.setItem('archive_poly_v22', JSON.stringify(arc));
        renderArchive();
    }

    function loadFromArchive(id, el) {
        applyBoing(el);
        const arc = JSON.parse(localStorage.getItem('archive_poly_v22')) || [];
        const item = arc.find(a => a.id === id);
        if (item) {
            lessonData = item.data;
            switchTab('game');
            showDashboard();
        }
    }

    function loadVocabFromArchive(id, vIdx, el) {
        applyBoing(el);
        const arc = JSON.parse(localStorage.getItem('archive_poly_v22')) || [];
        const item = arc.find(a => a.id === id);
        if (item) {
            lessonData = item.data;
            switchTab('game');
            setTimeout(() => startPractice(`vocab_${vIdx}_1`), 300);
        }
    }

    function saveToArchive() {
        if (!lessonData || !lessonData.id) return;
        let arc = JSON.parse(localStorage.getItem('archive_poly_v22')) || [];
        const pr = lessonData.completed.keys.filter(Boolean).length + (lessonData.completed.full ? 1 : 0) + lessonData.completed.vocab.filter(Boolean).length;
        const idx = arc.findIndex(a => a.id === lessonData.id);
        
        const dataToSave = { 
            id: lessonData.id, 
            date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }), 
            title_ko: lessonData.title_ko || "나의 이야기", 
            title_en: lessonData.title_en || lessonData.english || "My Story",
            mastered: (pr === 7), 
            data: lessonData,
            starred: idx !== -1 ? arc[idx].starred : false
        };

        if (idx !== -1) arc[idx] = dataToSave;
        else arc.unshift(dataToSave);
        
        localStorage.setItem('archive_poly_v22', JSON.stringify(arc));
    }

    console.log('%c✅ PolyGlot Master V22 FINAL – 모든 버그 완전 해결', 'color:#34C759; font-size:18px; font-weight:900;');
</script>
