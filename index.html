<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beginner Starter</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --soft-green-bg: #E8F5E9; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; }
        
        /* 탭 내비게이션 */
        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 0.5px solid #D1D1D6; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 14px; font-weight: 800; color: #8E8E93; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 채팅 & 내용 박스 */
        .chat-box { background: #fff; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px; text-align: center; }
        .ko-text { font-size: 18px; font-weight: 700; color: #444; margin-bottom: 15px; }
        .en-text { font-size: 24px; font-weight: 900; color: var(--ios-blue); margin-bottom: 15px; display: none; line-height: 1.4; }
        .guide-text { font-size: 14px; font-weight: 800; color: #8E8E93; margin-top: 10px; }

        /* 핵심 3표현 박스 */
        #keyWordsBox { display: none; background: #F8F8FA; border-radius: 16px; padding: 15px; margin-top: 20px; text-align: left; border: 1px solid #EAEAEA; }
        .kw-title { font-size: 12px; font-weight: 800; color: var(--ios-blue); margin-bottom: 10px; }
        .kw-item { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #333; }
        .kw-item span { color: #888; font-weight: 500; font-size: 13px; margin-left: 8px; }

        /* 사운드 재생 버튼 (TTS) */
        .btn-sound { background: #E8F5E9; color: var(--deep-green-text); border: none; padding: 10px 20px; border-radius: 20px; font-weight: 800; font-size: 14px; cursor: pointer; display: none; margin: 0 auto 15px auto; transition: 0.1s; }
        .btn-sound:active { transform: scale(0.95); }

        /* 메인 버튼류 */
        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; transition: transform 0.1s; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .btn-apple:active { transform: scale(0.95); }
        .btn-red { background: var(--ios-red); color: white; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-end { background: #FFFFFF; color: var(--dial-navy); box-shadow: 0 4px 12px rgba(0, 45, 94, 0.05); }

        /* 녹음 UI */
        #recordingPanel { display: none; background: #fff; border-radius: 20px; padding: 15px 20px; align-items: center; justify-content: space-between; gap: 12px; border: 1.5px solid var(--ios-red); margin-bottom: 15px; }
        .waveform-container { display: flex; align-items: center; gap: 3.5px; height: 40px; flex: 2.5; overflow: hidden; }
        .wave-bar { width: 3.5px; background: var(--ios-red); border-radius: 2px; height: 4px; transition: height 0.05s ease; flex-shrink: 0; }
        .btn-stop { background: var(--ios-red); color: white; border: none; padding: 12px 18px; border-radius: 14px; font-weight: 800; font-size: 14px; transition: 0.1s; flex: 1; }
        .btn-stop:active { transform: scale(0.92); }
    </style>
</head>
<body>

<div class="container">
    <nav class="nav-bar">
        <button class="tab active" id="tab-game" onclick="switchTab('game')">START LESSON</button>
        <button class="tab" id="tab-archive" onclick="switchTab('archive')">MY ARCHIVE</button>
    </nav>

    <div id="sec-game" class="section active">
        <div class="chat-box" id="chatBox">
            <div id="statusIcon" style="font-size: 40px; margin-bottom: 10px;">🎙️</div>
            <div class="ko-text" id="koText">"오늘 하루 어땠는지<br>한국어로 편하게 말해보세요!"</div>
            
            <button class="btn-sound" id="btnSound" onclick="playTTS()">🔊 원어민 발음 듣기</button>
            <div class="en-text" id="enText"></div>
            
            <div id="keyWordsBox">
                <div class="kw-title">🔥 꼭 알아야 할 핵심 3표현</div>
                <div id="kwList"></div>
            </div>

            <div class="guide-text" id="guideText">아래 버튼을 눌러 녹음을 시작하세요</div>
        </div>

        <div id="recordingPanel">
            <div class="waveform-container" id="waveform">
                <script>for(let i=0; i<30; i++) document.write('<div class="wave-bar"></div>');</script>
            </div>
            <button class="btn-stop" onclick="stopRecording()">완료</button>
        </div>

        <div id="controlPanel">
            <button id="mainBtn" class="btn-apple btn-red" onclick="startRecording()">한국어 녹음하기</button>
            <button id="retryBtn" class="btn-apple btn-red" style="display:none;" onclick="startRecording()">다시 시도하기</button>
            <button id="nextBtn" class="btn-apple btn-blue" style="display:none;" onclick="resetTurn()">다음 챕터 넘어가기</button>
            <button id="endBtn" class="btn-apple btn-end" style="display:none;" onclick="location.reload()">End Game</button>
        </div>
    </div>

    <div id="sec-archive" class="section">
        <h2 style="font-weight: 900; color: var(--dial-navy);">학습 저장소</h2>
        <p style="font-size: 13px; color: #888;">나중에 빈칸 뚫기 복습 모드가 이곳에 추가될 예정입니다.</p>
        <div id="archiveList"></div>
    </div>
</div>

<script>
    let currentStep = 'korean'; 
    let retryCount = 0; // 발음 재시도 횟수 카운터
    let currentSentenceData = {}; 

    let mediaRecorder, chunks = [];
    let audioCtx, analyser, dataArray, animationId;

    function switchTab(tab) {
        document.getElementById('sec-game').classList.remove('active');
        document.getElementById('sec-archive').classList.remove('active');
        document.getElementById('tab-game').classList.remove('active');
        document.getElementById('tab-archive').classList.remove('active');
        
        document.getElementById(`sec-${tab}`).classList.add('active');
        document.getElementById(`tab-${tab}`).classList.add('active');
    }

    // TTS 발음 듣기 함수
    function playTTS() {
        if (!currentSentenceData.en) return;
        const utterance = new SpeechSynthesisUtterance(currentSentenceData.en);
        utterance.lang = 'en-US';
        utterance.rate = 0.9; // 초보자를 위해 살짝 느리게
        window.speechSynthesis.speak(utterance);
    }

    async function startRecording() { 
        try { 
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContextClass(); 
            analyser = audioCtx.createAnalyser(); 
            audioCtx.createMediaStreamSource(stream).connect(analyser); 
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount); 
            mediaRecorder = new MediaRecorder(stream); 
            chunks = []; 
            mediaRecorder.ondataavailable = e => chunks.push(e.data); 
            mediaRecorder.onstop = processAI; 
            mediaRecorder.start(); 
            
            // 버튼 숨김 및 UI 세팅
            document.getElementById('controlPanel').style.display = 'none';
            document.getElementById('recordingPanel').style.display = 'flex';
            document.getElementById('statusIcon').innerText = '🔴';
            document.getElementById('guideText').innerText = currentStep === 'korean' ? "듣고 있습니다..." : "영어를 소리내어 읽어보세요!";
            drawWave(); 
        } catch(e) { alert("마이크 권한을 허용해주세요."); } 
    }
    
    function drawWave() { 
        animationId = requestAnimationFrame(drawWave); 
        analyser.getByteFrequencyData(dataArray); 
        const bars = document.querySelectorAll('.wave-bar'); 
        bars.forEach((bar, i) => { bar.style.height = Math.max(4, (dataArray[i % dataArray.length] / 128.0) * 45) + 'px'; }); 
    } 

    function stopRecording() { 
        mediaRecorder.stop(); cancelAnimationFrame(animationId); if(audioCtx) audioCtx.close(); 
        document.getElementById('recordingPanel').style.display = 'none'; 
        document.getElementById('statusIcon').innerText = '⏳';
        document.getElementById('guideText').innerText = "AI가 분석 중입니다...";
    }

    async function processAI() {
        const blob = new Blob(chunks, { type: 'audio/m4a' }); const reader = new FileReader(); reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            try {
                const payload = { audio: base64Audio, action: currentStep, target_english: currentSentenceData.en || "" };
                const response = await fetch("/api/openai-proxy", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                const data = await response.json(); 
                
                document.getElementById('controlPanel').style.display = 'block';
                document.getElementById('mainBtn').style.display = 'none';
                
                if (currentStep === 'korean') {
                    // 번역 결과 및 핵심 3단어 처리
                    currentSentenceData = { ko: data.korean, en: data.english, keys: data.key_expressions };
                    document.getElementById('statusIcon').innerText = '✨';
                    document.getElementById('koText').innerText = `"${data.korean}"`;
                    document.getElementById('enText').innerText = data.english;
                    document.getElementById('enText').style.display = 'block';
                    document.getElementById('btnSound').style.display = 'inline-block'; // 사운드 버튼 활성화
                    
                    // 핵심 단어 UI 채우기
                    if(data.key_expressions && data.key_expressions.length > 0) {
                        document.getElementById('keyWordsBox').style.display = 'block';
                        document.getElementById('kwList').innerHTML = data.key_expressions.map(kw => `<div class="kw-item">${kw.en} <span>${kw.ko}</span></div>`).join('');
                    }

                    document.getElementById('guideText').innerText = "원어민 발음을 듣고 따라 말해보세요!";
                    
                    const mainBtn = document.getElementById('mainBtn');
                    mainBtn.innerText = "영어로 따라 말하기";
                    mainBtn.className = "btn-apple btn-blue";
                    mainBtn.style.display = 'flex';
                    currentStep = 'english'; 
                    retryCount = 0; // 재시도 횟수 초기화
                    
                } else if (currentStep === 'english') {
                    // 발음 평가 (점수 네비게이션 로직)
                    const score = data.score || 0;
                    document.getElementById('statusIcon').innerText = score >= 80 ? '🎉' : '🤔';
                    document.getElementById('guideText').innerHTML = `<span style="color:var(--ios-blue); font-size:20px;">발음 점수: ${score}점</span><br><br>${data.feedback}`;
                    
                    document.getElementById('endBtn').style.display = 'flex';

                    if (score >= 80) {
                        // 80점 이상: 통과
                        document.getElementById('nextBtn').style.display = 'flex';
                        document.getElementById('retryBtn').style.display = 'none';
                    } else {
                        // 80점 미만: 재시도
                        retryCount++;
                        if (retryCount >= 2) {
                            // 2번 실패 시 자괴감 방지를 위해 다음으로 넘어가기 버튼 활성화
                            document.getElementById('nextBtn').style.display = 'flex';
                            document.getElementById('retryBtn').style.display = 'flex';
                        } else {
                            document.getElementById('retryBtn').style.display = 'flex';
                            document.getElementById('nextBtn').style.display = 'none';
                        }
                    }
                }
            } catch (e) { alert("서버 오류가 발생했습니다."); location.reload(); }
        };
    }

    function resetTurn() {
        currentStep = 'korean';
        currentSentenceData = {};
        document.getElementById('statusIcon').innerText = '🎙️';
        document.getElementById('koText').innerHTML = "다음 상황을<br>한국어로 말씀해주세요.";
        document.getElementById('enText').style.display = 'none';
        document.getElementById('btnSound').style.display = 'none';
        document.getElementById('keyWordsBox').style.display = 'none';
        document.getElementById('guideText').innerText = "아래 버튼을 눌러 녹음을 시작하세요";
        
        document.getElementById('mainBtn').innerText = "한국어 녹음하기";
        document.getElementById('mainBtn').className = "btn-apple btn-red";
        document.getElementById('mainBtn').style.display = 'flex';
        
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('retryBtn').style.display = 'none';
        document.getElementById('endBtn').style.display = 'none';
    }
</script>
</body>
</html>
