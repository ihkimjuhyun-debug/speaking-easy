<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speaking Master: Elite V2</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --master-green: #34C759; --skip-blue: #B3D4FF; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; padding: 20px; }
        
        /* 채팅 박스 및 텍스트 스타일 */
        .chat-box { background: #fff; border-radius: 24px; padding: 25px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .ko-text { font-size: 18px; font-weight: 700; color: #444; margin-bottom: 15px; }
        
        /* 카라오케 텍스트 스타일 */
        .en-text-container { font-size: 26px; font-weight: 800; line-height: 1.4; margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 8px; }
        .en-word { color: #D1D1D6; transition: color 0.15s ease; cursor: pointer; }
        .en-word.active-blue { color: var(--ios-blue); text-shadow: 0 0 10px rgba(0,122,255,0.2); }

        /* 버튼 스타일 */
        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; transition: 0.1s; margin-bottom: 10px; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-audio { background: #E8F5E9; color: var(--master-green); border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="chat-box">
        <div class="ko-text" id="koDisplay">"나는 공원에 가고 싶어요"</div>
        
        <button class="btn-audio" onclick="playKaraoke()">🔊 영어 듣기 (카라오케)</button>
        <button class="btn-audio" style="background:#F2F2F7; color:#555;" onclick="window.speechSynthesis.cancel()">⏸ 멈춤</button>

        <div class="en-text-container" id="enDisplay">
            </div>
    </div>

    <button class="btn-apple btn-blue" onclick="setupSentence('I want to go to the park')">새 문장 불러오기 (테스트)</button>
</div>

<script>
    const synth = window.speechSynthesis;
    let currentUtterance = null;

    // 1. 문장을 단어 단위로 쪼개서 화면에 뿌려주는 함수
    function setupSentence(sentence) {
        const container = document.getElementById('enDisplay');
        container.innerHTML = ''; // 초기화

        const words = sentence.split(' ');
        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.classList.add('en-word');
            span.innerText = word;
            span.id = `word-${index}`;
            container.appendChild(span);
        });
    }

    // 2. 카라오케 재생 함수 (핵심)
    function playKaraoke() {
        const container = document.getElementById('enDisplay');
        const text = container.innerText;
        if (!text) return;

        // 기존 재생 중인 것이 있으면 취소
        synth.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.8; // 사용자가 따라하기 좋게 약간 천천히

        const spans = container.querySelectorAll('.en-word');

        // 음성이 단어 경계를 넘을 때마다 실행
        utterance.onboundary = (event) => {
            if (event.name === 'word') {
                const charIndex = event.charIndex; // 현재 읽기 시작한 글자의 인덱스
                
                // 현재까지 읽은 글자 수를 바탕으로 몇 번째 단어인지 계산
                const spokenTextSoFar = text.substring(0, charIndex + event.charLength).trim();
                const currentWordIndex = spokenTextSoFar.split(/\s+/).length - 1;

                // UI 업데이트: 현재 단어까지 파란색으로 변경
                spans.forEach((span, i) => {
                    if (i <= currentWordIndex) {
                        span.classList.add('active-blue');
                    } else {
                        span.classList.remove('active-blue');
                    }
                });
            }
        };

        // 재생이 완료되면 다시 회색으로 초기화 (선택 사항)
        utterance.onend = () => {
            // 원한다면 끝났을 때 다시 회색으로 돌릴 수 있습니다.
            // spans.forEach(span => span.classList.remove('active-blue'));
        };

        synth.speak(utterance);
    }

    // 초기 실행 (예시 문장)
    setupSentence("I want to go to the park");
</script>

</body>
</html>
