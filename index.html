<script>
    const STORAGE_KEY = 'archive_poly_v40';
    let lessonData = null;
    let currentPracticeMode = null;
    let selectedDifficulty = 'intermediate';
    let currentLangMode = 'ko';

    let synth = window.speechSynthesis;
    let progressInt, timerInt, recSeconds = 0;
    let hiddenTTSWord = "";
    let currentMimeType = 'audio/webm'; // iOS 호환을 위해 실제 감지된 MIME 타입 저장

    let currentTargetText = "";

    function getSafeStorage() {
        try {
            const dataStr = localStorage.getItem(STORAGE_KEY);
            if (!dataStr) return [];
            const data = JSON.parse(dataStr);
            return Array.isArray(data) ? data : [];
        } catch (e) {
            console.error("스토리지 파싱 에러:", e);
            return []; 
        }
    }

    function normalizeLessonData(data) {
        if (!data || typeof data !== 'object') {
            data = { korean: "데이터 형식 오류", english: "Data Format Error" };
        }
        
        if (!data.drills || !Array.isArray(data.drills) || data.drills.length === 0) {
            data.drills = [
                {step: 1, ko: data.korean || "해석", en_full: data.english || "Text", blur_part: "none"},
                {step: 2, ko: data.korean || "해석", en_full: data.english || "Text", blur_part: "some"},
                {step: 3, ko: data.korean || "해석", en_full: data.english || "Text", blur_part: "all"}
            ];
        }

        if (!data.keys || !Array.isArray(data.keys) || data.keys.length === 0) {
            data.keys = [{ phrase: data.english || "Text", ko_org: data.korean || "해석", en_org: data.english || "Text" }];
        }
        data.keys.forEach(k => {
            if(!k) k = {};
            k.phrase = k.phrase || k.en_org || "Missing"; 
            k.ko_org = k.ko_org || data.korean || "해석 없음"; 
            k.en_org = k.en_org || data.english || "Missing Text";
            k.ko_var1 = k.ko_var1 || k.ko_org; 
            k.en_var1 = k.en_var1 || k.en_org;
            k.ko_var2 = k.ko_var2 || k.ko_org; 
            k.en_var2 = k.en_var2 || k.en_org;
            k.ko_long = k.ko_long || k.ko_org; 
            k.en_long = k.en_long || k.en_org;
        });

        if (!data.vocab || !Array.isArray(data.vocab) || data.vocab.length === 0) {
            data.vocab = [{ word: "N/A", meaning: "데이터 없음", pos: "N/A" }];
        }
        data.vocab.forEach(v => {
            if(!v) v = {};
            if (!v.drillOrder || v.drillOrder.length < 8) {
                v.drillOrder = [1, 2, 3, 4, 5, 6, 7, 8];
            }
            v.word = v.word || "N/A"; 
            v.meaning = v.meaning || "N/A";

            // ✅ 방어 코드: AI가 word에 한국어를 넣었을 경우
            // 한글이 포함되어 있으면 phonetics(영어 단어)와 교체 시도
            const hasKorean = /[가-힣]/.test(v.word);
            if (hasKorean) {
                // phonetics에 영어 단어가 있으면 교체
                if (v.phonetics && /[a-zA-Z]/.test(v.phonetics) && !/[가-힣]/.test(v.phonetics)) {
                    const temp = v.word;
                    v.word = v.phonetics.replace(/[^a-zA-Z\s'-]/g, '').trim();
                    v.meaning = v.meaning || temp;
                } else {
                    // 복구 불가능하면 word를 N/A로
                    v.meaning = v.word;
                    v.word = "N/A";
                }
            }

            v.wrong_options = v.wrong_options || ["오답1", "오답2"]; 
            v.confusing_words = v.confusing_words || [v.word + "e", v.word.substring(0, Math.max(1, v.word.length-1))];
            v.example_ko = v.example_ko || v.meaning || "해석"; 
            v.example_en = v.example_en || v.word || "Text";
            // 바리에이션 기본값
            v.var1_en = v.var1_en || v.example_en || v.word || "Text";
            v.var1_ko = v.var1_ko || v.example_ko || v.meaning || "해석";
            v.var2_en = v.var2_en || v.example_en || v.word || "Text";
            v.var2_ko = v.var2_ko || v.example_ko || v.meaning || "해석";
            v.var3_en = v.var3_en || v.example_en || v.word || "Text";
            v.var3_ko = v.var3_ko || v.example_ko || v.meaning || "해석";
            v.pos = v.pos || "단어"; 
            v.phonetics = v.phonetics || "";
        });

        if(!data.completed || typeof data.completed !== 'object') {
            data.completed = {};
        }
        if(!Array.isArray(data.completed.keys)) {
            data.completed.keys = new Array(data.keys.length).fill(false);
        }
        if(!Array.isArray(data.completed.vocab)) {
            data.completed.vocab = new Array(data.vocab.length).fill(false);
        }
        data.completed.full = !!data.completed.full;

        if(!data.dictionary || typeof data.dictionary !== 'object') {
            data.dictionary = {};
        }
        
        return data;
    }

    async function showCountdown() {
        return new Promise(resolve => {
            const overlay = document.getElementById('countdownOverlay');
            const num = document.getElementById('countdownNumber');
            overlay.style.display = 'flex'; 
            let count = 3;
            
            const cntInt = setInterval(() => { 
                num.innerText = count; 
                if(count === 0) { 
                    clearInterval(cntInt); 
                    overlay.style.display = 'none'; 
                    resolve(); 
                } 
                count--; 
            }, 1000);
            num.innerText = count--; 
        });
    }

    function initMicWithStream(stream, cb, barsElements) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
        analyser = audioCtx.createAnalyser(); 
        audioCtx.createMediaStreamSource(stream).connect(analyser); 
        analyser.fftSize = 64; 
        dataArray = new Uint8Array(analyser.frequencyBinCount); 

        // ✅ iOS 호환: 기기가 지원하는 MIME 타입 자동 감지
        // iOS Safari: audio/mp4, Chrome/Android: audio/webm
        const supportedTypes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
        const detectedType = supportedTypes.find(t => {
            try { return MediaRecorder.isTypeSupported(t); } catch(e) { return false; }
        }) || '';

        try {
            mediaRecorder = detectedType 
                ? new MediaRecorder(stream, { mimeType: detectedType }) 
                : new MediaRecorder(stream);
        } catch(e) {
            mediaRecorder = new MediaRecorder(stream);
        }

        // 실제 사용 중인 MIME 타입 저장 (getBase64Audio에서 사용)
        currentMimeType = mediaRecorder.mimeType || detectedType || 'audio/webm';

        chunks = []; 
        mediaRecorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = cb; 
        mediaRecorder.start(); 
        drawWaveSpecific(barsElements);
    }
    
    function drawWaveSpecific(bars) { 
        animationId = requestAnimationFrame(() => drawWaveSpecific(bars)); 
        analyser.getByteFrequencyData(dataArray); 
        bars.forEach((bar, i) => { 
            bar.style.height = Math.max(4, (dataArray[i % dataArray.length] / 128.0) * (bars.length > 20 ? 45 : 25)) + 'px'; 
        }); 
    }

    async function startMainRecording(btn) {
        applyBoing(btn); 
        btn.classList.add('glow-active'); 
        stopMicEngine();
        
        setTimeout(async () => {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                await showCountdown(); 
                
                document.getElementById('mainWaveContainer').style.display = 'flex'; 
                recSeconds = 0; 
                clearInterval(timerInt); 
                document.getElementById('mainRecTimer').innerText = "00:00"; 
                
                timerInt = setInterval(() => { 
                    recSeconds++; 
                    const m = String(Math.floor(recSeconds/60)).padStart(2,'0');
                    const s = String(recSeconds%60).padStart(2,'0');
                    document.getElementById('mainRecTimer').innerText = `${m}:${s}`; 
                }, 1000);
                
                initMicWithStream(activeStream, processKoreanAI, document.getElementById('mainWaveform').querySelectorAll('.wave-bar'));
                
                btn.innerText = "■ 완료"; 
                btn.classList.add('glow-active'); 
                btn.onclick = () => { 
                    applyBoing(btn); 
                    btn.classList.remove('glow-active'); 
                    mediaRecorder.stop(); 
                };
            } catch(e) { 
                alert("마이크 권한이 필요합니다."); 
                location.reload(); 
            }
        }, 400); 
    }
    
    async function getBase64Audio() { 
        // ✅ iOS 호환: 실제 녹음된 MIME 타입으로 Blob 생성 (webm 강제 X)
        const blob = new Blob(chunks, { type: currentMimeType }); 
        return new Promise(resolve => { 
            const r = new FileReader(); 
            r.onloadend = () => resolve(r.result.split(',')[1]); 
            r.readAsDataURL(blob); 
        }); 
    }

    async function processKoreanAI() {
        document.getElementById('mainWaveContainer').style.display = 'none'; 
        const loading = document.getElementById('loadingUIMain'); 
        const btn = document.getElementById('mainRecordBtn'); 
        
        btn.style.display = 'none'; 
        loading.style.display = 'block';
        
        clearInterval(progressInt);
        let w = 0;
        const progBar = document.getElementById('progressBarMain');
        const progText = document.getElementById('progressTextMain');

        const b64 = await getBase64Audio(); 
        stopMicEngine();

        try {
            // ─── 1단계: 음성 → 텍스트 (STT, ~3~5초) ───
            progText.innerText = "음성 변환 중...";
            progressInt = setInterval(() => {
                w += 3; if (w > 45) w = 45;
                progBar.style.width = w + '%';
            }, 200);

            const sttRes = await fetch("/api/stt", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ audio: b64, mimeType: currentMimeType, lang_mode: currentLangMode })
            });
            if (!sttRes.ok) throw new Error(`STT 에러: ${sttRes.status}`);
            const sttData = await sttRes.json();
            const userText = sttData.text || "";

            // 환각/빈값 체크
            const lowerText = userText.toLowerCase();
            const jpRegex = /[\u3040-\u30ff\u4e00-\u9fff]/;
            const isHallucination = lowerText.includes("mbc") || lowerText.includes("amara") || jpRegex.test(userText) || userText.trim().length < 2;
            if (isHallucination) {
                throw new Error("음성이 명확히 인식되지 않았습니다. 조용한 곳에서 다시 말씀해주세요!");
            }

            // ─── 2단계: 텍스트 → 학습 데이터 (GPT 분석, ~5~9초) ───
            clearInterval(progressInt);
            w = 48;
            progText.innerText = "AI 분석 중...";
            progressInt = setInterval(() => {
                w += 2; if (w > 95) w = 95;
                progBar.style.width = w + '%';
            }, 250);

            const analyzeRes = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: userText, difficulty: selectedDifficulty, lang_mode: currentLangMode })
            });
            if (!analyzeRes.ok) throw new Error(`분석 에러: ${analyzeRes.status}`);
            let tempLesson = await analyzeRes.json();

            if (tempLesson.error) {
                clearInterval(progressInt);
                loading.style.display = 'none';
                btn.style.display = 'block';
                btn.style.background = 'var(--ios-blue)';
                btn.innerHTML = '↺ 다시 시도';
                btn.onclick = () => startMainRecording(btn);
                alert(tempLesson.error);
                return;
            }

            lessonData = normalizeLessonData(tempLesson);
            lessonData.id = Date.now();

            lessonData.vocab.forEach(v => {
                let midDrills = [2, 3, 4];
                for (let i = midDrills.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [midDrills[i], midDrills[j]] = [midDrills[j], midDrills[i]];
                }
                v.drillOrder = [1, ...midDrills, 5, 6, 7, 8];
            });

            saveToArchive();

            clearInterval(progressInt);
            progBar.style.width = '100%';
            progText.innerText = '100%';

            setTimeout(() => {
                loading.style.display = 'none';
                showDashboard();
            }, 500);

        } catch (e) {
            console.error(e);
            clearInterval(progressInt);
            loading.style.display = 'none';
            btn.style.display = 'block';
            btn.style.background = 'var(--ios-blue)';
            btn.innerHTML = '↺ 다시 시도';
            btn.onclick = () => startMainRecording(btn);
            const msg = e.message && (e.message.includes('504') || e.message.includes('에러'))
                ? `오류: ${e.message}\n다시 시도해주세요.`
                : e.message || "분석에 실패했습니다. 다시 시도해주세요.";
            alert(msg);
        }
    }

    function showDictTooltip(cleanKey, originalWord, event, spanEl) {
        event.stopPropagation();
        if(!lessonData || !lessonData.dictionary) return;
        
        let dict = lessonData.dictionary[cleanKey] || lessonData.dictionary[originalWord.toLowerCase()] || lessonData.dictionary[originalWord];
        if(!dict) return; 

        const tt = document.getElementById('globalDictTooltip');
        document.getElementById('dictWord').innerText = originalWord; 
        document.getElementById('dictKo').innerText = dict.ko || ""; 
        document.getElementById('dictPos').innerText = dict.pos || ""; 
        document.getElementById('dictPhonetics').innerText = dict.phonetics ? ` | ${dict.phonetics}` : ""; 
        
        const contextBox = document.getElementById('koContextContainer'); 
        const contextText = document.getElementById('dictKoContext');
        
        if (dict.ko_context && dict.ko_context.trim() !== "") { 
            contextBox.style.display = 'block'; 
            contextText.innerText = dict.ko_context; 
        } else { 
            contextBox.style.display = 'none'; 
        }

        tt.style.display = 'block'; 
        tt.style.transform = 'none'; 
        
        const rect = spanEl.getBoundingClientRect(); 
        let finalLeft = rect.left + (rect.width / 2) - (tt.offsetWidth / 2);
        
        if (finalLeft < 15) finalLeft = 15; 
        if (finalLeft + tt.offsetWidth > window.innerWidth - 15) {
            finalLeft = window.innerWidth - tt.offsetWidth - 15;
        }
        
        tt.style.top = (rect.bottom + window.scrollY + 8) + 'px'; 
        tt.style.left = finalLeft + 'px';
    }

        const tt = document.getElementById('globalDictTooltip'); 
        if(tt) tt.style.display = 'none';

    function updateTTSUI() { 
        const playBtn = document.getElementById('btnPlayTTS'); 
        const pauseBtn = document.getElementById('btnPauseTTS'); 
        
        if (ttsIsPlaying) { 
            playBtn.style.display = 'none'; 
            pauseBtn.style.display = 'flex'; 
        } else { 
            playBtn.style.display = 'flex'; 
            pauseBtn.style.display = 'none'; 
        } 
    }
    
    function playTTS() {
        if (ttsIsPlaying) return; 
        synth.cancel();
        
        const textToSpeak = hiddenTTSWord || currentEnWordsArray.slice(ttsGlobalIndex).join(" ");
        if (!textToSpeak || textToSpeak.includes("?")) return;
        
        const ut = new SpeechSynthesisUtterance(textToSpeak); 
        ut.lang = 'en-US'; 
        ut.rate = 0.85; 
        window.currentUtterance = ut; 
        
        if (!hiddenTTSWord) { 
            ut.onboundary = (e) => { 
                if (e.name === 'word') { 
                    const actIdx = ttsGlobalIndex + textToSpeak.substring(0, e.charIndex).split(/\s+/).filter(x => x.length > 0).length; 
                    document.querySelectorAll('.en-word').forEach((span, i) => { 
                        if (!span.classList.contains('blurred')) { 
                            if (i <= actIdx) span.classList.add('active-blue'); 
                            else span.classList.remove('active-blue'); 
                        } 
                    }); 
                } 
            }; 
        }
        
        ut.onend = () => { 
            ttsIsPlaying = false; 
            if (!hiddenTTSWord && ttsGlobalIndex >= currentEnWordsArray.length - 1) { 
                ttsGlobalIndex = 0; 
                document.querySelectorAll('.en-word').forEach(s => { 
                    if (!s.classList.contains('blurred')) s.classList.add('active-blue'); 
                }); 
            } 
            updateTTSUI(); 
        }; 
        
        ut.onerror = () => { 
            ttsIsPlaying = false; 
            updateTTSUI(); 
        }; 
        
        ttsIsPlaying = true; 
        updateTTSUI(); 
        synth.speak(ut);
    }
    
    function pauseTTS() { 
        synth.cancel(); 
        ttsIsPlaying = false; 
        updateTTSUI(); 
    }

        synth.cancel();

    function renderInteractiveWords(text, blurMode = "") {
        const cont = document.getElementById('pracEnText'); 
        cont.innerHTML = ""; 
        
        if(!text) return; 
        currentEnWordsArray = text.split(" "); 
        
        const safeBlurMode = blurMode ? String(blurMode).toLowerCase() : "none";

        currentEnWordsArray.forEach((w, idx) => {
            const span = document.createElement('span'); 
            span.className = "en-word"; 
            span.innerText = w + " "; 
            span.id = `word-${idx}`; 
            
            const clean = w.replace(/[^a-zA-Z]/g, '').toLowerCase();
            
            if (safeBlurMode === "all" || (safeBlurMode !== "none" && safeBlurMode.includes(clean) && clean.length > 0)) {
                span.classList.add('blurred');
            }
            if (w.includes("?")) {
                span.style.color = '#D1D1D6';
            }
            
            span.onclick = () => { 
                if (span.classList.contains('blurred')) { 
                    // ✅ 첫 클릭: 블러 해제만, TTS 재생 안 함
                    span.classList.remove('blurred'); 
                    span.style.color = 'var(--ios-blue)'; 
                    span.style.background = 'transparent';
                    span.dataset.unblurred = 'true';
                    return; 
                } 
                // 두 번째 클릭부터: TTS 재생
                resetTTS(); 
                ttsGlobalIndex = idx; 
                playTTS(); 
            }; 
            cont.appendChild(span);
        });
    }

        document.getElementById('pracRecordBtn').style.display = 'none'; 
        const area = document.getElementById('mcqArea'); 
        area.style.display = 'flex'; 
        const confWords = v.confusing_words || [v.word + "e", v.word.substring(0, v.word.length-1)];

        area.innerHTML = opts.map(o => `<button class="mcq-btn" style="font-family:monospace; font-size:18px;" onclick="checkMCQ('${o}', '${v.word}', this)">${o}</button>`).join('');

    async function processPracticeAI() {
        document.getElementById('pracWaveContainer') && (document.getElementById('pracWaveContainer').style.display = 'none');
        const loading = document.getElementById('loadingUIPrac'); 
        const recBtn = document.getElementById('pracRecordBtn'); 
        
        // ✅ 버튼 원상복원 후 숨김
        restoreRecordBtn(recBtn);
        recBtn.style.display = 'none'; 
        loading.style.display = 'block';
        
        let w = 0; 
        clearInterval(progressInt); 
        document.getElementById('progressTextPrac').innerText = "0%"; 
        
        progressInt = setInterval(() => { 
            w += Math.floor(Math.random() * 8) + 2; 
            if(w > 95) w = 95; 
            document.getElementById('progressBarPrac').style.width = w+'%'; 
            document.getElementById('progressTextPrac').innerText = w + '%'; 
        }, 250);
        
        const b64 = await getBase64Audio(); 
        stopMicEngine(); 
        
        // ✅ BUG FIX: DOM에서 텍스트 파싱하지 않고 미리 저장한 currentTargetText 사용
        // 블러 처리된 단어, ???, 숨겨진 단어 등의 오염 없이 정확한 정답 전달
        const targetText = currentTargetText || "";
        
        if (!targetText) {
            // 음성 평가가 필요 없는 모드 (MCQ, 쓰기 등)
            clearInterval(progressInt);
            loading.style.display = 'none';
            recBtn.style.display = 'block';
            recBtn.dataset.recording = "false";
            recBtn.innerHTML = "↺ 다시 시도";
            return;
        }
        
        try {
            const res = await fetch("/api/openai-proxy", { 
                method: "POST", 
                headers: {"Content-Type": "application/json"}, 
                body: JSON.stringify({
                    audio: b64,
                    mimeType: currentMimeType,
                    action: 'evaluate', 
                    target_english: targetText
                }) 
            });
            
            if (!res.ok) throw new Error("서버 에러"); 
            
            const data = await res.json(); 
            clearInterval(progressInt); 
            
            document.getElementById('progressBarPrac').style.width = '100%'; 
            document.getElementById('progressTextPrac').innerText = '100%';
            
            setTimeout(() => { 
                loading.style.display = 'none'; 
                document.getElementById('pracGuideText').style.display = 'none'; 
                
                // ✅ BUG FIX: ???가 포함되지 않은 경우에만 하이라이팅
                if (targetText && !targetText.includes("?")) {
                    highlightAccurateWords(currentEnWordsArray, data.recognized_text); 
                }
                
                const safeScore = parseInt(data.score) || 0; 
                showResultArea(safeScore, data.feedback, data.recognized_text || "인식 실패", "파란색으로 표시된 단어는 정확합니다."); 
                
                recBtn.style.display = 'block'; 
                recBtn.dataset.recording = "false"; 
                recBtn.innerHTML = "↺ 다시 시도"; 
            }, 500);
            
        } catch(e) { 
            alert("평가 중 연결이 지연되었습니다. 다시 시도해주세요."); 
            loading.style.display = 'none'; 
            recBtn.style.display = 'block'; 
        }
    }

    function showResultArea(score, msg, targetText, feedback) {
        document.getElementById('pracResultArea').style.display = 'block'; 
        document.getElementById('scoreText').innerText = score; 
        document.getElementById('scoreMsg').innerText = msg; 
        
        if (targetText && targetText !== "???") { 
            document.getElementById('ansBubbleContainer').style.display = 'block'; 
            document.getElementById('targetTextDisplay').innerText = targetText; 
            document.getElementById('feedbackText').innerText = feedback; 
        } else { 
            document.getElementById('ansBubbleContainer').style.display = 'none'; 
        }
        
        const nextBtn = document.getElementById('pracNextBtn'); 
        if (score >= 70) { 
            nextBtn.className = 'btn-apple btn-next-active'; 
            nextBtn.innerHTML = '다음 단계 →'; 
            applyBoing(nextBtn); 
        } else { 
            nextBtn.className = 'btn-apple btn-skip-pale'; 
            nextBtn.innerHTML = '건너뛰기 →'; 
        }
    }

    function highlightAccurateWords(targets, recognized) {
        if (!recognized || !targets || targets.length === 0) return; 
        const recWords = recognized.toLowerCase().replace(/[^a-z\s]/g, '').split(/\s+/);
        
        document.querySelectorAll('.en-word').forEach((span, i) => { 
            if(!span.classList.contains('blurred')) { 
                const tw = (targets[i] || "").toLowerCase().replace(/[^a-z]/g, ''); 
                span.classList.remove('active-blue', 'dimmed'); 
                if (tw && recWords.includes(tw)) {
                    span.classList.add('active-blue'); 
                } else {
                    span.classList.add('dimmed'); 
                }
            } 
        });
    }

    function nextDrillStage(btn) {
        if(btn) applyBoing(btn); 
        resetTTS(); 
        stopMicEngine();
        
        if(!lessonData) return goDashboard();

        const p = currentPracticeMode.split('_'); 
        const ns = parseInt(p[p.length - 1]) + 1;
        
        if (currentPracticeMode.startsWith('key_')) { 
            if(ns > 8) { 
                if(lessonData.completed && lessonData.completed.keys) lessonData.completed.keys[parseInt(p[1])] = true; 
                goDashboard(); 
            } else { 
                currentPracticeMode = `key_${p[1]}_${ns}`; 
                setupPracticeUI(); 
            } 
        } 
        else if (currentPracticeMode.startsWith('vocab_')) { 
            if(ns > 8) { 
                if(lessonData.completed && lessonData.completed.vocab) lessonData.completed.vocab[parseInt(p[1])] = true; 
                goDashboard(); 
            } else { 
                currentPracticeMode = `vocab_${p[1]}_${ns}`; 
                setupPracticeUI(); 
            } 
        } 
        else { 
            if(ns > 3) { 
                if(lessonData.completed) lessonData.completed.full = true; 
                goDashboard(); 
            } else { 
                currentPracticeMode = `full_${ns}`; 
                setupPracticeUI(); 
            } 
        }
    }

    function goDashboard(btn) { 
        if(btn) applyBoing(btn); 
        resetTTS(); 
        stopMicEngine();
        const recBtn = document.getElementById('pracRecordBtn');
        if(recBtn) restoreRecordBtn(recBtn);
        saveToArchive(); 
        document.getElementById('practiceView').style.display = 'none'; 
        showDashboard(); 
    }

    function saveToArchive() {
        if(!lessonData || !lessonData.id) return; 
        
        let arc = getSafeStorage();
        
        const pr = (lessonData.completed.keys || []).filter(Boolean).length + 
                   (lessonData.completed.full ? 1 : 0) + 
                   (lessonData.completed.vocab || []).filter(Boolean).length;
                   
        const totalItems = (lessonData.keys ? lessonData.keys.length : 0) + 
                           (lessonData.vocab ? lessonData.vocab.length : 0) + 1;
                           
        const idx = arc.findIndex(a => a.id === lessonData.id);
        
        const dataToSave = { 
            id: lessonData.id, 
            date: new Date().toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }), 
            title_ko: lessonData.title_ko || "나의 이야기", 
            title_en: lessonData.title_en || "My Story", 
            mastered: (pr >= totalItems), 
            data: lessonData 
        };
        
        if (idx !== -1) { 
            dataToSave.starred = arc[idx].starred; 
            arc[idx] = dataToSave; 
        } else { 
            dataToSave.starred = false; 
            arc.unshift(dataToSave); 
        } 
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(arc));
    }

    function toggleStar(e, id) { 
        e.stopPropagation(); 
        applyBoing(e.target); 
        
        let arc = getSafeStorage(); 
        const idx = arc.findIndex(a => a.id === id); 
        
        if (idx === -1) return; 
        
        const currentStars = arc.filter(a => a.starred).length; 
        if (!arc[idx].starred) { 
            if (currentStars >= 3) { 
                alert("최상단 고정은 최대 3개까지만 가능합니다."); 
                return; 
            } 
            arc[idx].starred = true; 
        } else { 
            arc[idx].starred = false; 
        } 
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(arc)); 
        renderArchive(); 
    }
    
    function deleteArchive(e, id) { 
        e.stopPropagation(); 
        applyBoing(e.target); 
        
        if(!confirm("기록을 영구 삭제하시겠습니까?")) return; 
        
        let arc = getSafeStorage(); 
        arc = arc.filter(a => a.id !== id); 
        localStorage.setItem(STORAGE_KEY, JSON.stringify(arc)); 
        
        if (lessonData && lessonData.id === id) {
            location.reload(); 
        } else {
            renderArchive(); 
        }
    }

    function renderArchive() {
        const listStory = document.getElementById('archiveListStory'); 
        const listVocab = document.getElementById('archiveListVocab'); 
        
        let rawArc = getSafeStorage();
        let validArc = rawArc.filter(a => a && typeof a === 'object' && a.id);
        
        let arc = validArc.map(a => { 
            a.data = normalizeLessonData(a.data); 
            return a; 
        });

        if(arc.length === 0) { 
            listStory.innerHTML = "<p style='text-align:center; color:#888;'>저장된 기록이 없습니다.</p>"; 
            listVocab.innerHTML = "<p style='text-align:center; color:#888;'>저장된 단어가 없습니다.</p>"; 
            return; 
        }
        
        arc.sort((a, b) => { 
            if (a.starred && !b.starred) return -1; 
            if (!a.starred && b.starred) return 1; 
            return 0; 
        });

        let storyHtml = '';
        arc.forEach(a => {
            try {
                const totalKeys = a.data.keys ? a.data.keys.length : 0;
                const totalVocab = a.data.vocab ? a.data.vocab.length : 0;
                const totalItems = totalKeys + totalVocab + 1;

                const keysC = (a.data.completed.keys || []).filter(Boolean).length;
                const fullC = a.data.completed.full ? 1 : 0;
                const vocabC = (a.data.completed.vocab || []).filter(Boolean).length;
                
                const pr = keysC + fullC + vocabC;
                const isMastered = (pr >= totalItems);

                let textCol = '#D1D1D6'; 
                let bgCol = '#fff'; 
                let exClass = '';
                
                const ratio = totalItems > 0 ? pr / totalItems : 0;
                if(ratio > 0 && ratio <= 0.3) { textCol='#8E8E93'; bgCol='#F2F2F7'; } 
                else if(ratio > 0.3 && ratio <= 0.6) { textCol='#FFD60A'; bgCol='#FFFBE6'; } 
                else if(ratio > 0.6 && ratio < 1) { textCol='#34C759'; bgCol='#E8F5E9'; } 
                else if(isMastered) { textCol='#fff'; bgCol='#1C1C1E'; exClass='black-glow'; } 
                
                storyHtml += `
                <div class="archive-bubble boing-active ${exClass}" onclick="loadFromArchive(${a.id}, this)" style="background:${bgCol};">
                    <div class="archive-header">
                        <div>
                            <span style="color:${isMastered?'#aaa':'#555'};">${a.date || ''}</span>
                            <span style="color:${textCol}; font-weight:900; margin-left:8px;">${isMastered?'🏆 완벽 정복':'⏳ 진행 중'}(${pr}/${totalItems})</span>
                        </div>
                        <div style="display:flex; gap: 12px; align-items:center;">
                            <span class="icon-btn" onclick="toggleStar(event, ${a.id})">${a.starred ? '⭐' : '☆'}</span>
                            <span class="icon-btn" onclick="deleteArchive(event, ${a.id})" style="opacity: 0.6;">🗑️</span>
                        </div>
                    </div>
                    <div style="font-size:13px; color:${isMastered?'#aaa':'#888'}; font-weight:800; margin-bottom: 2px; margin-top: 8px;">${a.title_ko || '상황 요약'}</div>
                    <div class="archive-title" style="font-size:18px; ${isMastered?'color:#fff;':''}">${a.title_en || 'My Story'}</div>
                </div>`;
            } catch (err) {
                console.error("스토리 항목 렌더링 오류:", err);
            }
        });
        listStory.innerHTML = storyHtml;

        let vocabHtml = '';
        arc.forEach(a => { 
            if(a.data && a.data.vocab) { 
                a.data.vocab.forEach((v, vIdx) => { 
                    try {
                        const isMastered = (a.data.completed && a.data.completed.vocab) ? a.data.completed.vocab[vIdx] : false; 
                        
                        vocabHtml += `
                        <div class="lesson-card boing-active ${isMastered ? 'mastered' : ''}" onclick="loadVocabFromArchive(${a.id}, ${vIdx}, this)" style="margin-bottom:0;">
                            <div style="flex:1;">
                                <div class="ko" style="font-size:13px; color:#888;">${v.pos || '단어'} | ${v.phonetics || ''}</div>
                                <div class="en" style="font-size:20px; font-weight:900; margin-top:2px;">${v.word || 'N/A'}</div>
                                <div class="ko" style="font-size:15px; color:#444; margin-top:2px; font-weight:800;">${v.meaning || '해석'}</div>
                            </div>
                            <div style="font-size:24px;">${isMastered ? '✅' : '▶'}</div>
                        </div>`; 
                    } catch (err) {
                        console.error("단어 항목 렌더링 오류:", err);
                    }
                }); 
            } 
        });
        listVocab.innerHTML = vocabHtml;
    }
    
    function loadFromArchive(id, el) { 
        applyBoing(el); 
        stopMicEngine(); 
        const arc = getSafeStorage(); 
        const item = arc.find(a => a.id === id); 
        if(item) { 
            lessonData = normalizeLessonData(item.data); 
            setTimeout(() => {
                switchTab('game'); 
                showDashboard();
            }, 200); 
        } 
    }
    
    function loadVocabFromArchive(id, vIdx, el) { 
        applyBoing(el); 
        stopMicEngine(); 
        const arc = getSafeStorage(); 
        const item = arc.find(a => a.id === id); 
        if(item) { 
            lessonData = normalizeLessonData(item.data); 
            setTimeout(() => { 
                document.getElementById('tab-archive').classList.remove('active'); 
                document.getElementById('sec-archive').classList.remove('active'); 
                document.getElementById('tab-game').classList.add('active'); 
                document.getElementById('sec-game').classList.add('active'); 
                startPractice(`vocab_${vIdx}_1`); 
            }, 200); 
        } 
    }
</script>
