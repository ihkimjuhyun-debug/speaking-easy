<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PolyGlot Master: Final V23</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --master-green: #34C759;
            --skip-blue: #B3D4FF; 
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); display: flex; flex-direction: column; padding-bottom: 40px; position: relative; }
        
        @keyframes boing { 0% { transform: scale(1); } 40% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .boing-active { animation: boing 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        @keyframes glowSuccess { 0% { box-shadow: 0 0 5px var(--ios-blue); } 100% { box-shadow: 0 0 20px var(--ios-blue); } }
        .btn-next-active { animation: glowSuccess 1s infinite alternate !important; background: var(--ios-blue) !important; color: white !important; font-weight: 900 !important; transform: scale(1.02); }

        .nav-bar { display: flex; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 0.5px solid #D1D1D6; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; padding: 16px 0; border: none; background: none; font-size: 14px; font-weight: 800; color: #8E8E93; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--ios-blue); border-bottom: 2.5px solid var(--ios-blue); }

        .section { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .speech-bubble { background: #fff; border-radius: 20px; padding: 22px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        .dash-label { font-size: 12px; font-weight: 800; color: #888; margin-bottom: 8px; }
        .en-text-container { font-size: 26px; font-weight: 900; line-height: 1.3; color: var(--apple-navy); }
        .en-word { display: inline-block; margin-right: 5px; margin-bottom: 5px; transition: 0.2s; cursor: pointer; }
        .en-word.active-blue { color: var(--ios-blue) !important; }
        .en-word.blurred { background: #E5E5EA; color: transparent !important; border-radius: 6px; padding: 0 5px; }
        .dict-link { border-bottom: 2px solid #E5E5EA; }

        /* ✨ 게이지바 위치 고정 (중앙 하단 영역) */
        #loadingUI { display: none; margin-bottom: 15px; width: 100%; }
        .progress-box { background: #fff; border-radius: 16px; padding: 18px; border: 2px solid var(--ios-blue); box-shadow: 0 5px 15px rgba(0,122,255,0.1); }
        .progress-header { display: flex; justify-content: space-between; font-weight: 900; color: var(--ios-blue); margin-bottom: 10px; font-size: 15px; }
        .progress-bg { height: 12px; background: #E5E5EA; border-radius: 6px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--ios-blue); width: 0%; transition: width 0.3s; }

        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-red { background: var(--ios-red); color: white; }
        .btn-gray { background: #E5E5EA; color: var(--apple-navy); }

        .score-bubble { background: #F8F8FA; border-radius: 16px; padding: 20px; display: flex; align-items: center; margin-bottom: 20px; border: 1px solid #eee; }
        .score-num { font-size: 45px; font-weight: 900; color: var(--ios-blue); }
        
        #globalDictTooltip { 
            display: none; position: absolute; background: rgba(0,0,0,0.9); color: #fff; padding: 16px; border-radius: 16px; 
            font-size: 14px; z-index: 99999; width: max-content; max-width: 80vw; box-shadow: 0 10px 25px rgba(0,0,0,0.3); word-break: break-all;
        }

        .lesson-card { background: #fff; border: 2px solid #eee; border-radius: 18px; padding: 18px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .mastered { border-color: var(--master-green); background: #f2fcf4; }

        .archive-bubble { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body onclick="hideDictTooltip()">

<div class="container">
    <nav class="nav-bar">
        <button class="tab active" id="tab-game" onclick="switchTab('game')">GAME START</button>
        <button class="tab" id="tab-archive" onclick="switchTab('archive')">STORAGE</button>
    </nav>

    <div id="sec-game" class="section active">
        <div id="loadingUI">
            <div class="progress-box">
                <div class="progress-header"><span>분석 중...</span><span id="progressText">0%</span></div>
                <div class="progress-bg"><div class="progress-bar" id="progressBar"></div></div>
            </div>
        </div>

        <div id="introView">
            <div class="speech-bubble" style="text-align: center;">
                <div style="font-size: 40px; margin-bottom: 10px;">🎙️</div>
                <div id="introMainTitle" style="font-size: 20px; font-weight: 900;">일상 대화를 한국어로<br>말해보세요!</div>
                <div style="margin-top:20px; display:flex; gap:5px; background:#F2F2F7; padding:5px; border-radius:12px;">
                    <div class="tab active" id="diff-beginner" onclick="setDiff('beginner')">🌱 초급</div>
                    <div class="tab" id="diff-intermediate" onclick="setDiff('intermediate')">🌿 중급</div>
                    <div class="tab" id="diff-advanced" onclick="setDiff('advanced')">🌳 고급</div>
                </div>
            </div>
            <button class="btn-apple btn-red" onclick="startMainRecording(this)">녹음 시작하기</button>
        </div>

        <div id="dashboardView" style="display:none;">
            <div class="speech-bubble">
                <div class="dash-label">AI 교정 문장</div>
                <div class="en-text-container" id="dashEnText"></div>
                <div id="dashKoText" style="margin-top:10px; font-weight:700; color:#555; border-top:1px solid #eee; padding-top:10px;"></div>
            </div>
            <div id="keyList"></div>
            <div id="vocabList"></div>
            <div id="fullDrillCard"></div>
            <button class="btn-apple btn-gray" onclick="location.reload()">새로운 대화 하기</button>
        </div>

        <div id="practiceView" style="display:none;">
            <div class="step-badge-container"><div class="step-badge" id="stepBadge">STEP 1</div></div>
            <div class="speech-bubble"><div id="pracKoText" style="font-size:18px; font-weight:800; text-align:center;"></div></div>
            <div class="speech-bubble"><div class="en-text-container" id="pracEnText" style="text-align:center;"></div></div>
            
            <div id="pracResultArea" style="display:none;">
                <div class="score-bubble">
                    <div class="score-num" id="scoreText">0</div>
                    <div id="scoreMsg" style="margin-left:15px; font-weight:700; line-height:1.4;"></div>
                </div>
            </div>

            <button id="pracRecordBtn" class="btn-apple btn-red" onclick="toggleQuickRecord(this)" data-recording="false">발음 녹음하기</button>
            <div style="display:flex; gap:10px;">
                <button class="btn-apple btn-gray" onclick="goDashboard()" style="flex:1;">목록</button>
                <button id="pracNextBtn" class="btn-apple btn-gray" onclick="nextStage()" style="flex:2;">건너뛰기 ➡️</button>
            </div>
        </div>
    </div>

    <div id="sec-archive" class="section">
        <div id="archiveList"></div>
    </div>
</div>

<div id="globalDictTooltip" onclick="event.stopPropagation();">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div id="dictWord" style="font-size:20px; font-weight:900; color:var(--skip-blue);"></div>
        <div style="font-size:22px; cursor:pointer;" onclick="playWord(event)">🔊</div>
    </div>
    <div id="dictKo" style="font-weight:800; margin-top:5px; font-size:16px;"></div>
    <div id="dictExp" style="font-style:italic; color:#ccc; margin-top:8px; font-size:13px; border-left:2px solid var(--ios-blue); padding-left:8px;"></div>
</div>

<script>
    let lessonData, currentMode, difficulty = 'beginner', mediaRecorder, chunks = [], progressInt;
    const synth = window.speechSynthesis;

    function switchTab(t) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        document.getElementById('sec-' + t).classList.add('active');
        if(t === 'archive') renderArchive();
    }

    function setDiff(d) {
        difficulty = d;
        document.querySelectorAll('#introView .tab').forEach(t => t.classList.remove('active'));
        document.getElementById('diff-' + d).classList.add('active');
    }

    async function startMainRecording(btn) {
        applyBoing(btn);
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = processMain;
        mediaRecorder.start();
        btn.innerText = "말하는 중... (완료 시 클릭)";
        btn.onclick = () => mediaRecorder.stop();
    }

    async function processMain() {
        document.getElementById('introView').style.display = 'none';
        const loading = document.getElementById('loadingUI');
        loading.style.display = 'block';
        let w = 0;
        progressInt = setInterval(() => {
            w += Math.random() * 6; if(w > 97) w = 97;
            document.getElementById('progressBar').style.width = w + '%';
            document.getElementById('progressText').innerText = Math.floor(w) + '%';
        }, 200);

        const blob = new Blob(chunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const res = await fetch('/api/openai-proxy', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ audio: base64, action: 'korean', difficulty: difficulty })
            });
            lessonData = await res.json();
            clearInterval(progressInt);
            document.getElementById('progressBar').style.width = '100%';
            document.getElementById('progressText').innerText = '100%';
            setTimeout(() => { loading.style.display = 'none'; showDashboard(); saveArchive(); }, 400);
        };
    }

    function showDashboard() {
        document.getElementById('dashboardView').style.display = 'block';
        document.getElementById('dashKoText').innerText = lessonData.korean;
        const cont = document.getElementById('dashEnText');
        cont.innerHTML = lessonData.english.split(' ').map(w => {
            const clean = w.toLowerCase().replace(/[^a-z]/g, '');
            return `<span class="en-word dict-link" onclick="showDictTooltip('${clean}', event, this)">${w}</span>`;
        }).join(' ');

        document.getElementById('keyList').innerHTML = lessonData.keys.map((k, i) => `
            <div class="lesson-card" onclick="startPractice('key_${i}_1')">
                <div><div style="font-size:12px; color:#888;">핵심 표현</div><div style="font-weight:800; font-size:17px;">${k.phrase}</div></div>
                <div>▶</div>
            </div>
        `).join('');
        
        document.getElementById('vocabList').innerHTML = lessonData.vocab.map((v, i) => `
            <div class="lesson-card" onclick="startPractice('vocab_${i}_1')">
                <div><div style="font-size:12px; color:#888;">단어 8단계</div><div style="font-weight:800; font-size:17px;">${v.word} (${v.meaning})</div></div>
                <div>📝</div>
            </div>
        `).join('');

        document.getElementById('fullDrillCard').innerHTML = `
            <div class="lesson-card" onclick="startPractice('full_1')" style="background:var(--ios-blue); color:white; border:none;">
                <div style="font-weight:900; font-size:18px;">전체 문장 마스터 (3단계)</div>
                <div>🏆</div>
            </div>
        `;
    }

    function startPractice(mode) {
        currentMode = mode;
        document.getElementById('dashboardView').style.display = 'none';
        document.getElementById('practiceView').style.display = 'block';
        setupPractice();
    }

    function setupPractice() {
        const [type, idx, step] = currentMode.split('_');
        let ko, en, blur;
        document.getElementById('pracResultArea').style.display = 'none';
        const nextBtn = document.getElementById('pracNextBtn');
        nextBtn.classList.remove('btn-next-active');
        nextBtn.innerText = "건너뛰기 ➡️";

        if(type === 'key') {
            const k = lessonData.keys[idx];
            document.getElementById('stepBadge').innerText = `PHRASE STEP ${step}/3`;
            en = k.en_org; ko = k.ko_org;
            if(step == 1) blur = 'none'; else if(step == 2) blur = k.phrase; else blur = 'all';
        } else if(type === 'vocab') {
            const v = lessonData.vocab[idx];
            document.getElementById('stepBadge').innerText = `VOCAB STEP ${step}/8`;
            en = v.word; ko = v.meaning; blur = (step % 2 == 0) ? 'all' : 'none';
            // 8단계 훈련용 텍스트 가변화 (생략 가능)
        } else {
            document.getElementById('stepBadge').innerText = `FULL STEP ${step}/3`;
            en = lessonData.english; ko = lessonData.korean;
            if(step == 1) blur = 'none'; else if(step == 2) blur = lessonData.keys[0].phrase; else blur = 'all';
        }
        document.getElementById('pracKoText').innerText = ko;
        renderPracticeWords(en, blur);
    }

    /* ✨ TTS 하이라이팅 버그 수정 */
    function renderPracticeWords(text, blur) {
        const cont = document.getElementById('pracEnText');
        cont.innerHTML = text.split(' ').map((w, i) => {
            const isBlur = blur === 'all' || (blur !== 'none' && w.toLowerCase().includes(blur.toLowerCase()));
            return `<span id="word-${i}" class="en-word ${isBlur ? 'blurred' : ''}" onclick="playWordSync('${w}', ${i})">${w}</span>`;
        }).join(' ');
    }

    function playWordSync(w, idx) {
        synth.cancel();
        const ut = new SpeechSynthesisUtterance(w);
        ut.onstart = () => document.getElementById(`word-${idx}`).classList.add('active-blue');
        ut.onend = () => document.getElementById(`word-${idx}`).classList.remove('active-blue');
        synth.speak(ut);
    }

    async function toggleQuickRecord(btn) {
        if(btn.dataset.recording === 'true') {
            mediaRecorder.stop();
            btn.dataset.recording = 'false';
            btn.innerText = "발음 녹음하기";
            return;
        }
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.onstop = processEval;
        mediaRecorder.start();
        btn.dataset.recording = 'true';
        btn.innerText = "녹음 중... (완료 시 클릭)";
    }

    async function processEval() {
        const loading = document.getElementById('loadingUI');
        loading.style.display = 'block';
        let w = 0;
        const pi = setInterval(() => { w += 15; if(w > 95) w = 95; document.getElementById('progressBar').style.width = w + '%'; }, 100);

        const blob = new Blob(chunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            const target = document.getElementById('pracEnText').innerText;
            const res = await fetch('/api/openai-proxy', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ audio: base64, action: 'evaluate', target_english: target })
            });
            const data = await res.json();
            clearInterval(pi);
            loading.style.display = 'none';
            
            document.getElementById('pracResultArea').style.display = 'block';
            document.getElementById('scoreText').innerText = data.score;
            document.getElementById('scoreMsg').innerText = data.feedback;
            
            // ✨ 점수 시스템 & 애니메이션 복구
            if(data.score >= 70) {
                const nBtn = document.getElementById('pracNextBtn');
                nBtn.classList.add('btn-next-active');
                nBtn.innerText = "다음 단계 ➡️";
                applyBoing(nBtn);
            }
        };
    }

    function nextStage() {
        const [type, idx, step] = currentMode.split('_');
        const next = parseInt(step) + 1;
        const max = type === 'vocab' ? 8 : 3;
        if(next > max) goDashboard();
        else { currentMode = `${type}_${idx}_${next}`; setupPractice(); }
    }

    function showDictTooltip(word, event, el) {
        event.stopPropagation();
        const dict = lessonData.dictionary[word] || lessonData.dictionary[word.toLowerCase()] || { ko: "뜻 데이터 확인 중", expression: "" };
        const tt = document.getElementById('globalDictTooltip');
        document.getElementById('dictWord').innerText = word;
        document.getElementById('dictKo').innerText = dict.ko;
        document.getElementById('dictExp').innerText = dict.expression;
        tt.style.display = 'block';
        const rect = el.getBoundingClientRect();
        tt.style.top = (rect.bottom + window.scrollY + 10) + 'px';
        tt.style.left = Math.max(10, Math.min(window.innerWidth - tt.offsetWidth - 10, rect.left)) + 'px';
    }

    function hideDictTooltip() { document.getElementById('globalDictTooltip').style.display = 'none'; }
    function playWord(e) { e.stopPropagation(); synth.cancel(); synth.speak(new SpeechSynthesisUtterance(document.getElementById('dictWord').innerText)); }
    function applyBoing(el) { el.classList.remove('boing-active'); void el.offsetWidth; el.classList.add('boing-active'); }
    function goDashboard() { document.getElementById('practiceView').style.display = 'none'; document.getElementById('dashboardView').style.display = 'block'; }

    function saveArchive() {
        let arc = JSON.parse(localStorage.getItem('arc_v23') || '[]');
        arc.unshift({ id: Date.now(), t_ko: lessonData.title_ko, t_en: lessonData.title_en, data: lessonData });
        localStorage.setItem('arc_v23', JSON.stringify(arc.slice(0, 25)));
    }

    function renderArchive() {
        const arc = JSON.parse(localStorage.getItem('arc_v23') || '[]');
        document.getElementById('archiveList').innerHTML = arc.map(a => `
            <div class="archive-bubble" onclick='loadArchive(${JSON.stringify(a.data)})'>
                <div style="font-size:12px; color:#888; font-weight:800;">${a.t_ko}</div>
                <div style="font-size:18px; font-weight:900; margin-top:3px;">${a.t_en}</div>
            </div>
        `).join('');
    }

    function loadArchive(data) { lessonData = data; switchTab('game'); showDashboard(); }
</script>
</body>
</html>
