<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speaking Master: Beginner Starter</title>
    <style>
        :root { 
            --apple-navy: #1C1C1E; --ios-blue: #007AFF; --ios-red: #FF3B30; 
            --ios-bg: #F2F2F7; --dial-navy: #002D5E; --soft-green-bg: #E8F5E9; 
            --deep-green-text: #2E7D32; --border: #D1D1D6; --bubble-gray: #F8F8FA;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; background: var(--ios-bg); margin: 0; color: var(--apple-navy); overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background: var(--ios-bg); padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* 타이틀 */
        .header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .header h1 { font-size: 24px; font-weight: 900; color: var(--dial-navy); margin: 0; }
        .header p { font-size: 13px; color: #8E8E93; margin-top: 5px; font-weight: 600; }

        /* 대화창 (버블) UI */
        .chat-box { background: #fff; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 20px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        .ko-text { font-size: 18px; font-weight: 700; color: #444; margin-bottom: 15px; }
        .en-text { font-size: 24px; font-weight: 900; color: var(--ios-blue); margin-bottom: 15px; display: none; }
        .guide-text { font-size: 14px; font-weight: 800; color: #8E8E93; margin-top: 10px; }

        /* 쫀득한 애플 버튼 */
        .btn-apple { width: 100%; height: 60px; border-radius: 18px; border: none; font-size: 17px; font-weight: 800; cursor: pointer; transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .btn-apple:active { transform: scale(0.95); opacity: 0.85; }
        .btn-red { background: var(--ios-red); color: white; }
        .btn-blue { background: var(--ios-blue); color: white; }
        
        /* End Game 버튼 (세련된 하얀 바탕 + 네이비 글씨) */
        .btn-end { background: #FFFFFF; color: var(--dial-navy); border: none; box-shadow: 0 4px 12px rgba(0, 45, 94, 0.05); }

        /* 녹음 UI */
        #recordingPanel { display: none; background: #fff; border-radius: 20px; padding: 15px 20px; align-items: center; justify-content: space-between; gap: 12px; border: 1.5px solid var(--ios-red); margin-bottom: 15px; }
        .waveform-container { display: flex; align-items: center; gap: 3.5px; height: 40px; flex: 2.5; overflow: hidden; }
        .wave-bar { width: 3.5px; background: var(--ios-red); border-radius: 2px; height: 4px; transition: height 0.05s ease; flex-shrink: 0; }
        .btn-stop { background: var(--ios-red); color: white; border: none; padding: 12px 18px; border-radius: 14px; font-weight: 800; font-size: 14px; transition: transform 0.1s; flex: 1; }
        .btn-stop:active { transform: scale(0.92); }

        /* 로딩 UI */
        #loadingUI { display: none; text-align: center; padding: 20px 0; }
        .loader { font-size: 15px; font-weight: 800; color: var(--ios-blue); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* 최종 리뷰 UI */
        #reviewUI { display: none; }
        .review-card { background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 15px; border-left: 6px solid var(--ios-blue); box-shadow: 0 5px 15px rgba(0,0,0,0.03); text-align: left;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Beginner Starter</h1>
        <p>내 일상을 영어로 바꿔서 말해보세요</p>
    </div>

    <div class="chat-box" id="chatBox">
        <div id="statusIcon" style="font-size: 40px; margin-bottom: 10px;">🎙️</div>
        <div class="ko-text" id="koText">"오늘 하루 어땠는지<br>한국어로 편하게 말해보세요!"</div>
        <div class="en-text" id="enText"></div>
        <div class="guide-text" id="guideText">아래 버튼을 눌러 녹음을 시작하세요</div>
    </div>

    <div id="recordingPanel">
        <div class="waveform-container" id="waveform">
            <script>for(let i=0; i<30; i++) document.write('<div class="wave-bar"></div>');</script>
        </div>
        <button class="btn-stop" onclick="stopRecording()">완료</button>
    </div>

    <div id="loadingUI"><div class="loader">AI가 영어로 번역하고 있어요...</div></div>

    <div id="controlPanel">
        <button id="mainBtn" class="btn-apple btn-red" onclick="startRecording()">한국어 녹음하기</button>
        <button id="nextBtn" class="btn-apple btn-blue" style="display:none;" onclick="resetTurn()">다음 문장 만들기</button>
        <button id="endBtn" class="btn-apple btn-end" onclick="showReview()">End Game (핵심 3문장 복습)</button>
    </div>

    <div id="reviewUI">
        <h2 style="font-weight: 900; color: var(--dial-navy); margin-bottom: 20px;">🔥 오늘의 핵심 3문장</h2>
        <div id="reviewList"></div>
        <button class="btn-apple btn-blue" onclick="location.reload()" style="margin-top: 30px;">새로운 세션 시작</button>
    </div>
</div>

<script>
    let currentStep = 'korean'; // 'korean' (한국어 녹음) -> 'english' (영어 발음 연습)
    let sessionHistory = []; // 이번 게임에서 말한 문장들 저장
    let currentSentenceData = {}; // 현재 턴의 데이터 저장

    let mediaRecorder, chunks = [];
    let audioCtx, analyser, dataArray, animationId;

    async function startRecording() { 
        try { 
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContextClass(); 
            analyser = audioCtx.createAnalyser(); 
            audioCtx.createMediaStreamSource(stream).connect(analyser); 
            analyser.fftSize = 64; 
            dataArray = new Uint8Array(analyser.frequencyBinCount); 
            mediaRecorder = new MediaRecorder(stream); 
            chunks = []; 
            mediaRecorder.ondataavailable = e => chunks.push(e.data); 
            mediaRecorder.onstop = processAI; 
            mediaRecorder.start(); 
            
            // UI 변경
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('endBtn').style.display = 'none';
            document.getElementById('recordingPanel').style.display = 'flex';
            document.getElementById('statusIcon').innerText = '🔴';
            if(currentStep === 'korean') {
                document.getElementById('koText').innerHTML = "듣고 있습니다...<br>편하게 말씀하세요.";
            } else {
                document.getElementById('guideText').innerText = "위의 영어 문장을 소리내어 읽어보세요!";
            }
            drawWave(); 
        } catch(e) { alert("마이크 권한을 허용해주세요."); } 
    }
    
    function drawWave() { 
        animationId = requestAnimationFrame(drawWave); 
        analyser.getByteFrequencyData(dataArray); 
        const bars = document.querySelectorAll('.wave-bar'); 
        bars.forEach((bar, i) => { bar.style.height = Math.max(4, (dataArray[i % dataArray.length] / 128.0) * 45) + 'px'; }); 
    } 

    function stopRecording() { 
        mediaRecorder.stop(); cancelAnimationFrame(animationId); if(audioCtx) audioCtx.close(); 
        document.getElementById('recordingPanel').style.display = 'none'; 
        document.getElementById('loadingUI').style.display = 'block'; 
        document.querySelector('.loader').innerText = currentStep === 'korean' ? "AI가 원어민 표현으로 바꾸고 있어요..." : "발음을 분석하고 있어요...";
        document.getElementById('statusIcon').innerText = '⏳';
    }

    async function processAI() {
        const blob = new Blob(chunks, { type: 'audio/m4a' }); const reader = new FileReader(); reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64Audio = reader.result.split(',')[1];
            try {
                // 현재 스텝에 따라 서버에 다른 요청(action)을 보냅니다.
                const payload = { audio: base64Audio, action: currentStep, target_english: currentSentenceData.en || "" };
                const response = await fetch("/api/openai-proxy", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                const data = await response.json(); 
                
                document.getElementById('loadingUI').style.display = 'none'; 
                
                if (currentStep === 'korean') {
                    // 한국어 녹음 후 -> 영어 번역 결과 표시
                    currentSentenceData = { ko: data.korean, en: data.english };
                    document.getElementById('statusIcon').innerText = '✨';
                    document.getElementById('koText').innerText = `"${data.korean}"`;
                    document.getElementById('enText').innerText = data.english;
                    document.getElementById('enText').style.display = 'block';
                    document.getElementById('guideText').innerText = "이 문장을 소리내어 읽어볼까요?";
                    
                    const mainBtn = document.getElementById('mainBtn');
                    mainBtn.innerText = "영어로 따라 말하기";
                    mainBtn.className = "btn-apple btn-blue";
                    mainBtn.style.display = 'flex';
                    currentStep = 'english'; // 다음 스텝으로 변경
                    
                } else if (currentStep === 'english') {
                    // 영어 낭독 후 -> 피드백 표시 및 저장
                    document.getElementById('statusIcon').innerText = data.score >= 80 ? '🎉' : '👍';
                    document.getElementById('guideText').innerHTML = `<span style="color:var(--ios-blue); font-size:20px;">발음 점수: ${data.score}점!</span><br><br>${data.feedback}`;
                    
                    // 히스토리에 저장
                    sessionHistory.push(currentSentenceData);
                    
                    document.getElementById('nextBtn').style.display = 'flex';
                    document.getElementById('endBtn').style.display = 'flex';
                }
            } catch (e) { alert("오류가 발생했습니다."); location.reload(); }
        };
    }

    function resetTurn() {
        currentStep = 'korean';
        currentSentenceData = {};
        document.getElementById('statusIcon').innerText = '🎙️';
        document.getElementById('koText').innerHTML = "다음 문장을<br>한국어로 말씀해주세요.";
        document.getElementById('enText').style.display = 'none';
        document.getElementById('guideText').innerText = "아래 버튼을 눌러 녹음을 시작하세요";
        
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.innerText = "한국어 녹음하기";
        mainBtn.className = "btn-apple btn-red";
        mainBtn.style.display = 'flex';
        
        document.getElementById('nextBtn').style.display = 'none';
    }

    function showReview() {
        document.getElementById('chatBox').style.display = 'none';
        document.getElementById('controlPanel').style.display = 'none';
        document.getElementById('reviewUI').style.display = 'block';
        
        const listUI = document.getElementById('reviewList');
        if (sessionHistory.length === 0) {
            listUI.innerHTML = "<p>학습한 문장이 없습니다.</p>";
            return;
        }

        // 최신 3문장만 (또는 랜덤 3문장) 리뷰
        const top3 = sessionHistory.slice(-3).reverse();
        listUI.innerHTML = top3.map((item, idx) => `
            <div class="review-card">
                <div style="font-size:12px; font-weight:800; color:#8E8E93; margin-bottom:5px;">Sentence ${idx+1}</div>
                <div style="font-size:14px; color:#444; margin-bottom:8px; font-weight:700;">🇰🇷 ${item.ko}</div>
                <div style="font-size:18px; color:var(--ios-blue); font-weight:900;">🇺🇸 ${item.en}</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
